<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>小手机桌面预览</title>
  <style>
    :root {
      --bg-base: #fff4f5;
      --bg-surface: rgba(255, 251, 252, 0.72);
      --bg-surface-strong: rgba(255, 250, 251, 0.9);
      --bg-widget: rgba(255, 249, 251, 0.82);
      --text-primary: #8f7480;
      --text-secondary: #b697a7;
      --text-soft: #c8adbc;
      --line-soft: rgba(250, 199, 218, 0.28);
      --shadow-soft: 0 10px 30px rgba(226, 199, 213, 0.18);
      --shadow-card: 0 12px 36px rgba(216, 194, 206, 0.18);
      --blue-1: #d1e3ff;
      --blue-2: #e2f3ff;
      --pink-1: #fac7da;
      --pink-2: #fff4f5;
      --cream: #fffaf7;
      --icon-stroke: #8f7480;
      --icon-fill-soft: #fffdfd;
      --dock-bg: rgba(255, 250, 252, 0.7);
      --blur: blur(20px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(250, 199, 218, 0.3), transparent 24%),
        radial-gradient(circle at 84% 24%, rgba(209, 227, 255, 0.38), transparent 28%),
        radial-gradient(circle at 50% 78%, rgba(226, 243, 255, 0.4), transparent 24%),
        linear-gradient(180deg, #fff7f9 0%, #fff3f7 100%);
      color: var(--text-primary);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .phone-screen {
      width: min(100%, 430px);
      min-height: 88vh;
      border-radius: 36px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(250, 199, 218, 0.26), transparent 22%),
        radial-gradient(circle at 82% 22%, rgba(209, 227, 255, 0.34), transparent 24%),
        radial-gradient(circle at 52% 60%, rgba(226, 243, 255, 0.22), transparent 22%),
        linear-gradient(180deg, #fff7fa 0%, #fff4f7 100%);
      box-shadow:
        0 24px 70px rgba(214, 188, 204, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      padding: calc(env(safe-area-inset-top) + 14px) 16px calc(env(safe-area-inset-bottom) + 120px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding: 4px 2px 0;
      font-weight: 600;
      color: #1f1f1f;
      font-size: 15px;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #222;
    }

    .signal,
    .battery {
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .signal i {
      display: block;
      width: 3px;
      border-radius: 999px;
      background: #222;
    }

    .signal i:nth-child(1) { height: 6px; opacity: 0.55; }
    .signal i:nth-child(2) { height: 8px; opacity: 0.72; }
    .signal i:nth-child(3) { height: 10px; opacity: 0.86; }
    .signal i:nth-child(4) { height: 12px; }

    .battery-pill {
      min-width: 28px;
      height: 16px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 10px;
      display: grid;
      place-items: center;
      padding: 0 6px;
      line-height: 1;
    }

    .widgets {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 14px;
      margin-bottom: 22px;
    }

    .widget {
      background: var(--bg-widget);
      backdrop-filter: var(--blur);
      border: 1px solid rgba(255,255,255,0.62);
      border-radius: 28px;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
    }

    .widget::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.46), transparent 46%),
        radial-gradient(circle at 78% 24%, rgba(209, 227, 255, 0.2), transparent 28%),
        radial-gradient(circle at 22% 82%, rgba(250, 199, 218, 0.18), transparent 24%);
      pointer-events: none;
    }

    .widget-time {
      padding: 18px 18px 16px;
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .time-big {
      font-size: 42px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -1.2px;
      color: var(--text-primary);
    }

    .time-date {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .mini-deco {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-soft);
    }

    .dot-heart {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink-1), var(--blue-1));
      box-shadow: 0 0 0 4px rgba(255,255,255,0.35);
    }

    .widget-weather {
      min-height: 132px;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .weather-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .weather-mark {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,255,255,0.38)),
        linear-gradient(135deg, var(--blue-2), var(--pink-2));
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.72);
    }

    .weather-temp {
      text-align: right;
    }

    .weather-temp strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      color: var(--text-primary);
    }

    .weather-temp span,
    .weather-note {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
    }

    .widget-wide {
      grid-column: 1 / -1;
      min-height: 96px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bubble-icon {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.72);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.68), rgba(255,255,255,0.42)),
        linear-gradient(135deg, var(--pink-2), var(--blue-2));
      box-shadow: var(--shadow-soft);
    }

    .widget-text strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .widget-text span {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px 10px;
      margin-top: 2px;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
    }

    .app-name {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 600;
      text-align: center;
      line-height: 1.15;
    }

    .stitch-icon {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      padding: 8px;
      position: relative;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.42), rgba(255,255,255,0.14)),
        conic-gradient(
          from 180deg at 50% 50%,
          #fdf8f8 0deg 90deg,
          var(--blue-1) 90deg 180deg,
          var(--pink-2) 180deg 270deg,
          var(--cream) 270deg 360deg
        );
      box-shadow:
        0 12px 24px rgba(207, 187, 200, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.76);
      border: 1px solid rgba(255,255,255,0.72);
      overflow: hidden;
    }

    .stitch-icon::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 19px;
      border: 1.6px dashed rgba(173, 182, 211, 0.34);
      pointer-events: none;
    }

    .stitch-icon::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 15px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.46), transparent 50%);
      opacity: 0.6;
      pointer-events: none;
    }

    .icon-inner {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.44), rgba(255,255,255,0.16));
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
    }

    .stitch-svg {
      width: 62%;
      height: 62%;
      stroke: var(--icon-stroke);
      stroke-width: 2.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .music-note .stitch-svg {
      width: 56%;
      height: 56%;
    }

    .dock {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: calc(env(safe-area-inset-bottom) + 18px);
      padding: 14px 16px;
      border-radius: 32px;
      background: var(--dock-bg);
      backdrop-filter: blur(26px);
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow:
        0 20px 40px rgba(211, 187, 201, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.85);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .dock-app {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
    }

    .dock .stitch-icon {
      width: 64px;
      height: 64px;
      border-radius: 22px;
      box-shadow:
        0 10px 20px rgba(207, 187, 200, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.76);
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 4px);
      transform: translateX(-50%);
      width: 136px;
      height: 5px;
      border-radius: 999px;
      background: rgba(212, 182, 198, 0.72);
    }

    @media (max-width: 390px) {
      .phone-screen {
        padding-inline: 14px;
      }

      .widgets {
        gap: 12px;
      }

      .stitch-icon {
        width: 70px;
        height: 70px;
      }

      .dock .stitch-icon {
        width: 58px;
        height: 58px;
      }

      .app-name {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="phone-screen">
    <div class="top-bar">
      <div>4:52 ♥</div>
      <div class="top-right">
        <div>5G</div>
        <div class="signal">
          <i></i><i></i><i></i><i></i>
        </div>
        <div class="battery">
          <div class="battery-pill">56</div>
        </div>
      </div>
    </div>

    <section class="widgets">
      <article class="widget widget-time">
        <div class="mini-deco">
          <span class="dot-heart"></span>
          <span>小软云今天也醒啦</span>
        </div>
        <div>
          <div class="time-big">04:52</div>
          <div class="time-date">7月7日 星期二</div>
        </div>
      </article>

      <article class="widget widget-weather">
        <div class="weather-top">
          <div class="weather-mark">
            <svg viewBox="0 0 24 24" class="stitch-svg" style="width:22px;height:22px;">
              <circle cx="12" cy="12" r="4.2"></circle>
              <path d="M12 2.5v2.6M12 18.9v2.6M21.5 12h-2.6M5.1 12H2.5M18.7 5.3l-1.9 1.9M7.2 16.8l-1.9 1.9M18.7 18.7l-1.9-1.9M7.2 7.2 5.3 5.3"></path>
            </svg>
          </div>
          <div class="weather-temp">
            <strong>26°</strong>
            <span>微风轻拂</span>
          </div>
        </div>
        <div class="weather-note">莓莓云顶奶 · 好天气模式</div>
      </article>

      <article class="widget widget-wide">
        <div class="bubble-icon">
          <svg viewBox="0 0 24 24" class="stitch-svg" style="width:24px;height:24px;">
            <path d="M5 10.5c0-3.4 2.8-6.2 6.2-6.2h1.6c3.4 0 6.2 2.8 6.2 6.2s-2.8 6.2-6.2 6.2H10l-3.8 2.5.9-3.1C5.8 14.9 5 12.8 5 10.5z"></path>
          </svg>
        </div>
        <div class="widget-text">
          <strong>今天也要记得喝水哦</strong>
          <span>我把软软提醒贴在桌面上啦</span>
        </div>
      </article>

      <article class="widget widget-wide">
        <div class="bubble-icon">
          <svg viewBox="0 0 24 24" class="stitch-svg" style="width:24px;height:24px;">
            <path d="M9 18V8.4a1.4 1.4 0 0 1 1.1-1.37l6.6-1.45a.9.9 0 0 1 1.1.88v8.48"></path>
            <circle cx="8" cy="18" r="2.2"></circle>
            <circle cx="17.2" cy="16.8" r="2.2"></circle>
          </svg>
        </div>
        <div class="widget-text">
          <strong>正在播放</strong>
          <span>棉花糖心事 · 轻轻转呀转</span>
        </div>
      </article>
    </section>

    <section class="app-grid">
      <div class="app">
        <div class="stitch-icon">
          <div class="icon-inner">
            <svg viewBox="0 0 24 24" class="stitch-svg">
              <path d="M6.5 9.5c0-2.8 2.2-5 5-5h1c2.8 0 5 2.2 5 5v4.6c0 2.8-2.2 5-5 5h-1a5 5 0 0 1-3.4-1.3L5 19l1.1-3A4.9 4.9 0 0 1 6.5 14V9.5z"></path>
              <path d="M9.2 10.6h5.6M9.2 14h4.2"></path>
            </svg>
          </div>
        </div>
        <div class="app-name">聊天</div>
      </div>

      <div class="app">
        <div class="stitch-icon">
          <div class="icon-inner">
            <svg viewBox="0 0 24 24" class="stitch-svg">
              <circle cx="12" cy="12" r="3.1"></circle>
              <path d="M19 12a7 7 0 0 0-.1-1.1l2-1.6-2-3.5-2.5 1a7.8 7.8 0 0 0-1.9-1.1L14 3h-4l-.5 2.7a7.8 7.8 0 0 0-1.9 1.1l-2.5-1-2 3.5 2 1.6A7 7 0 0 0 5 12c0 .4 0 .8.1 1.1l-2 1.6 2 3.5 2.5-1c.6.5 1.2.8 1.9 1.1L10 21h4l.5-2.7c.7-.3 1.3-.6 1.9-1.1l2.5 1 2-3.5-2-1.6c.1-.3.1-.7.1-1.1z"></path>
            </svg>
          </div>
        </div>
        <div class="app-name">设置</div>
      </div>

      <div class="app music-note">
        <div class="stitch-icon">
          <div class="icon-inner">
            <svg viewBox="0 0 24 24" class="stitch-svg">
              <path d="M10 17V7.5a1.2 1.2 0 0 1 1-1.18l6-1.32a.8.8 0 0 1 1 .78v8.02"></path>
              <circle cx="9" cy="17.4" r="2.2"></circle>
              <circle cx="17" cy="15.8" r="2.2"></circle>
            </svg>
          </div>
        </div>
        <div class="app-name">音乐</div>
      </div>

      <div class="app">
        <div class="stitch-icon">
          <div class="icon-inner">
            <svg viewBox="0 0 24 24" class="stitch-svg">
              <path d="M8 6.5h8a2.5 2.5 0 0 1 2.5 2.5v6.5A2.5 2.5 0 0 1 16 18H8A2.5 2.5 0 0 1 5.5 15.5V9A2.5 2.5 0 0 1 8 6.5z"></path>
              <path d="M8.5 10.2 12 12.7l3.5-2.5"></path>
            </svg>
          </div>
        </div>
        <div class="app-name">邮箱</div>
      </div>
    </section>

    <nav class="dock">
      <div class="dock-app">
        <div class="stitch-icon">
          <div class="icon-inner">
            <svg viewBox="0 0 24 24" class="stitch-svg">
              <path d="M6.5 9.5c0-2.8 2.2-5 5-5h1c2.8 0 5 2.2 5 5v4.6c0 2.8-2.2 5-5 5h-1a5 5 0 0 1-3.4-1.3L5 19l1.1-3A4.9 4.9 0 0 1 6.5 14V9.5z"></path>
              <path d="M9.2 10.6h5.6M9.2 14h4.2"></path>
            </svg>
          </div>
        </div>
      </div>

      <div class="dock-app">
        <div class="stitch-icon">
          <div class="icon-inner">
            <svg viewBox="0 0 24 24" class="stitch-svg">
              <path d="M6.8 8.2h10.4M6.8 12h10.4M6.8 15.8h6.4"></path>
              <path d="M7.5 4.8h9a2.7 2.7 0 0 1 2.7 2.7v9a2.7 2.7 0 0 1-2.7 2.7h-9a2.7 2.7 0 0 1-2.7-2.7v-9a2.7 2.7 0 0 1 2.7-2.7z"></path>
            </svg>
          </div>
        </div>
      </div>

      <div class="dock-app">
        <div class="stitch-icon">
          <div class="icon-inner">
            <svg viewBox="0 0 24 24" class="stitch-svg">
              <path d="M8 7.2h8a2 2 0 0 1 2 2v8.3a1.2 1.2 0 0 1-1.9 1L12 15.8l-4.1 2.7a1.2 1.2 0 0 1-1.9-1V9.2a2 2 0 0 1 2-2z"></path>
              <path d="M9 7.2a3 3 0 0 1 6 0"></path>
            </svg>
          </div>
        </div>
      </div>

      <div class="dock-app">
        <div class="stitch-icon">
          <div class="icon-inner">
            <svg viewBox="0 0 24 24" class="stitch-svg">
              <path d="M7 8.5h10a1.8 1.8 0 0 1 1.8 1.8v5.2A1.8 1.8 0 0 1 17 17.3H7a1.8 1.8 0 0 1-1.8-1.8v-5.2A1.8 1.8 0 0 1 7 8.5z"></path>
              <path d="M9 8.5V7.4A3 3 0 0 1 12 4.5a3 3 0 0 1 3 2.9v1.1"></path>
            </svg>
          </div>
        </div>
      </div>
    </nav>

    <div class="home-indicator"></div>
  </main>
</body>
</html>
