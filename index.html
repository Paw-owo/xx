<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="">
  <meta name="format-detection" content="telephone=no">
  <title>小手机</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/app-touch-icon.svg">

  <style>
    :root {
      --desktop-icon-scale: 1;
      --desktop-widget-scale: 1;
      --desktop-dock-scale: 1;
      --desktop-wallpaper-soft: 0;
      --desktop-card-blur: 20px;
      --desktop-soft-shadow: var(--shadow-sm);
      --desktop-icon-art-size: 68px;
      --desktop-icon-svg-size: 62px;
    }

    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    textarea,
    select {
      -webkit-appearance: none;
      appearance: none;
      outline: 0;
      font-family: inherit;
      color: inherit;
      border-color: transparent;
    }

    button,
    button:hover,
    button:focus,
    button:focus-visible,
    button:active,
    input,
    input:hover,
    input:focus,
    input:focus-visible,
    textarea,
    textarea:hover,
    textarea:focus,
    textarea:focus-visible,
    select,
    select:hover,
    select:focus,
    select:focus-visible {
      border-color: transparent !important;
    }

    input,
    textarea,
    select {
      font-size: 16px;
      line-height: 1.6;
      background: transparent;
      transform: translateZ(0);
    }

    input:focus,
    textarea:focus,
    select:focus {
      font-size: 16px;
    }

    @supports (-webkit-touch-callout: none) {
      input,
      textarea,
      select {
        font-size: 16px !important;
      }
    }

    button {
      padding: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    .phone-desktop {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-main);
    }

    .has-image {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .desktop-soft-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: var(--bg-primary);
      opacity: var(--desktop-wallpaper-soft);
      transition: all 200ms ease;
    }

    .desktop-journal-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: var(--bg-primary);
      opacity: 1;
    }

    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 8;
      height: calc(54px + env(safe-area-inset-top));
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: env(safe-area-inset-top) 20px 7px;
      pointer-events: none;
    }

    .status-cute-pill {
      width: min(86vw, 360px);
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--bg-card) 88%, transparent);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .status-cute-pill svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .86;
    }

    .status-cute-pill .status-paw {
      color: var(--accent-dark);
    }

    .status-time,
    .status-online {
      flex: 0 0 auto;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .status-online.is-offline {
      color: var(--accent-dark);
    }

    .dock,
    .page-dots,
    .desktop-icon,
    .desktop-icon-art,
    .widget-mark,
    .lock-dots,
    .lock-key,
    .app-back,
    .placeholder-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .desktop-pages {
      position: fixed;
      inset: calc(58px + env(safe-area-inset-top)) 0 calc(108px + env(safe-area-inset-bottom));
      z-index: 1;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .desktop-pages::-webkit-scrollbar {
      display: none;
    }

    .desktop-pages.dragging {
      scroll-snap-type: none;
      scroll-behavior: auto;
      touch-action: none;
    }

    .desktop-page {
      position: relative;
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      overflow: hidden;
      scroll-snap-align: start;
    }

    .desktop-widget-area,
    .desktop-free-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .desktop-widget-area {
      z-index: 0;
      height: calc(424px * var(--desktop-widget-scale));
      pointer-events: none;
      border-radius: 0 0 34px 34px;
      background-color: color-mix(in srgb, var(--bg-card) 24%, transparent);
      box-shadow: inset 0 -1px 0 color-mix(in srgb, var(--border-soft) 48%, transparent);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .desktop-free-layer {
      z-index: 1;
    }

    .desktop-item {
      position: absolute;
      z-index: 2;
      touch-action: none;
      transition: transform 200ms ease, opacity 200ms ease;
    }

    .desktop-item.dragging,
    .dock .desktop-icon.dock-dragging {
      z-index: 20;
      opacity: .94;
      transform: scale(1.035);
      transition: none;
    }

    /* 落位 settling 态：松手瞬间 .dragging → .settling，保持 transition:none 并锁定
       拖拽态 transform(scale 1.035)，隔离 :active 伪类与 transition 的叠加。
       浏览器在 pointerup 后通常还会保留一帧 :active，若此时直接移除 .dragging，
       :active 的 scale(.96) 会叠加恢复的 transition:all 触发 1.035→0.96→1.0 双段缩闪。
       settling 持续约两帧 + 短延迟，待 :active 释放后再移除，此时 transform 从
       1.035 单次平滑回到 none（轻点按压反馈不受影响，轻点不进入 dragging/settling）。 */
    .desktop-item.settling {
      z-index: 20;
      opacity: .94;
      transform: scale(1.035);
      transition: none;
    }

    .desktop-icon {
      width: calc(74px * var(--desktop-icon-scale));
      flex-direction: column;
      gap: calc(7px * var(--desktop-icon-scale));
      padding: 0;
      margin: 0;
      background: transparent;
      box-shadow: none;
      outline: 0;
      color: var(--text-primary);
      touch-action: none;
      transition: all 200ms ease;
    }

    .desktop-icon:focus,
    .desktop-icon:focus-visible,
    .desktop-icon:active {
      background: transparent;
      box-shadow: none;
      outline: 0;
    }

    .desktop-widget:active,
    .app-back:active,
    .lock-key:active {
      transform: scale(.96);
    }

    .desktop-icon.editing,
    .desktop-widget.editing {
      animation: icon-wiggle 180ms ease-in-out infinite;
    }

    .phone-desktop.silent-edit .desktop-icon.editing,
    .phone-desktop.silent-edit .desktop-widget.editing {
      animation: none;
    }

    .desktop-icon-art {
      width: calc(58px * var(--desktop-icon-scale));
      height: calc(58px * var(--desktop-icon-scale));
      overflow: hidden;
      padding: 0;
      margin: 0;
      border-radius: calc(19px * var(--desktop-icon-scale));
      background: color-mix(in srgb, var(--bg-card) 86%, transparent);
      color: var(--accent-dark);
      box-shadow: var(--desktop-soft-shadow);
      backdrop-filter: blur(var(--desktop-card-blur));
      -webkit-backdrop-filter: blur(var(--desktop-card-blur));
    }

    .desktop-icon-art.has-custom-image {
      padding: 0;
      margin: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .desktop-icon-art:not(.has-custom-image):has(.cozy-app-icon) {
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .cozy-app-icon {
      width: calc(var(--desktop-icon-svg-size) * var(--desktop-icon-scale));
      height: calc(var(--desktop-icon-svg-size) * var(--desktop-icon-scale));
      --icon-line: var(--icon-line-stable);
      --icon-base: var(--icon-body-stable);
      --icon-paper: var(--icon-layer-stable);
      --icon-highlight: var(--icon-highlight-stable);
      --icon-charm: var(--icon-charm-theme);
      overflow: visible;
    }

    .cozy-app-icon g {
      fill: none;
      stroke: var(--icon-line);
      stroke-width: 3.2;
      vector-effect: non-scaling-stroke;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cozy-app-icon .base, .cozy-app-icon .fur { fill: var(--icon-base); }
    .cozy-app-icon .paper, .cozy-app-icon .soft { fill: var(--icon-paper); }
    .cozy-app-icon .highlight { fill: var(--icon-highlight); }
    .cozy-app-icon .charm, .cozy-app-icon .accent, .cozy-app-icon .sparkle { fill: var(--icon-charm); }
    .cozy-app-icon .line-only { fill: none; }
    .cozy-app-icon .face { fill: var(--icon-line); stroke: none; }
    .cozy-app-icon .blush { stroke: var(--icon-charm); }
    .cozy-app-icon .icon-decoration {
      stroke: var(--icon-detail);
      stroke-width: 2.8;
    }
    .cozy-app-icon .icon-decoration .sparkle { fill: var(--icon-charm); }

    .placeholder-icon .cozy-app-icon {
      width: 54px;
      height: 54px;
    }

    .desktop-icon-art svg:not(.cozy-app-icon) {
      width: calc(27px * var(--desktop-icon-scale));
      height: calc(27px * var(--desktop-icon-scale));
      flex: 0 0 auto;
    }

    .desktop-icon-image,
    .placeholder-icon img,
    .lock-avatar img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      margin: 0;
      padding: 0;
      background: transparent;
      box-shadow: none;
      outline: 0;
    }

    .desktop-icon-name {
      width: calc(84px * var(--desktop-icon-scale));
      color: var(--text-primary);
      font-size: calc(12px * var(--desktop-icon-scale));
      line-height: 1.25;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 1px 12px color-mix(in srgb, var(--bg-primary) 80%, transparent);
    }

    .desktop-delete-dot {
      position: absolute;
      top: -5px;
      right: 4px;
      width: 18px;
      height: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--accent);
      color: var(--bubble-user-text);
      box-shadow: var(--shadow-sm);
    }

    .desktop-icon.editing .desktop-delete-dot {
      display: flex;
    }

    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--color-primary, var(--accent-dark)), var(--color-accent, var(--accent)));
      color: var(--bg-surface, var(--bg-card));
      border: 2px solid var(--bg-surface, var(--bg-card));
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 45%, transparent);
      transition: transform 280ms var(--ease-soft, cubic-bezier(0.34, 1.56, 0.64, 1));
    }

    .badge.hidden {
      display: none;
    }

    @keyframes badge-jelly {
      0%, 100% { transform: scale(1, 1); }
      25% { transform: scale(1.15, 0.85); }
      50% { transform: scale(0.9, 1.1); }
      75% { transform: scale(1.05, 0.95); }
    }

    .badge.badge-pop {
      animation: badge-jelly 600ms cubic-bezier(0.34, 1.56, 0.64, 1);
      animation-iteration-count: 1;
      animation-fill-mode: forwards;
    }

    .desktop-widget {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(15px * var(--desktop-widget-scale));
      overflow: hidden;
      border-radius: calc(28px * var(--desktop-widget-scale)) calc(28px * var(--desktop-widget-scale)) calc(18px * var(--desktop-widget-scale)) calc(28px * var(--desktop-widget-scale));
      border: 1px solid color-mix(in srgb, var(--border-soft) 62%, transparent);
      background-color: color-mix(in srgb, var(--bg-card) 86%, transparent);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: var(--text-primary);
      box-shadow: var(--desktop-soft-shadow);
      backdrop-filter: blur(var(--desktop-card-blur));
      -webkit-backdrop-filter: blur(var(--desktop-card-blur));
      touch-action: none;
      transition: all 200ms ease;
    }

    .desktop-widget.has-image {
      background-color: color-mix(in srgb, var(--bg-card) 18%, transparent);
    }

    .desktop-widget.has-image::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      border-radius: inherit;
      background: color-mix(in srgb, var(--bg-card) 18%, transparent);
    }

    .desktop-widget.square,
    .desktop-widget.circle {
      width: calc(132px * var(--desktop-widget-scale));
      height: calc(132px * var(--desktop-widget-scale));
    }

    .desktop-widget.rectangle {
      width: calc(216px * var(--desktop-widget-scale));
      height: calc(114px * var(--desktop-widget-scale));
    }

    .desktop-widget.wide {
      width: min(calc(306px * var(--desktop-widget-scale)), calc(100vw - 40px));
      height: calc(106px * var(--desktop-widget-scale));
    }

    .desktop-widget.circle {
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .desktop-widget > * {
      position: relative;
      z-index: 1;
    }

    .widget-label,
    .time-widget-sub,
    .focus-text {
      color: var(--text-secondary);
      font-size: calc(var(--font-size-small) * var(--desktop-widget-scale));
      line-height: 1.45;
    }

    .widget-label {
      font-size: calc(12px * var(--desktop-widget-scale));
      line-height: 1.3;
      font-weight: 500;
    }

    .widget-value {
      color: var(--text-primary);
      font-size: calc(16px * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      text-shadow: 0 1px 12px color-mix(in srgb, var(--bg-primary) 72%, transparent);
    }

    .weather-content {
      min-width: 0;
    }

    .weather-meta,
    .weather-notice {
      margin-top: calc(4px * var(--desktop-widget-scale));
      color: var(--text-secondary);
      font-size: calc(10px * var(--desktop-widget-scale));
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .weather-notice {
      color: var(--text-hint);
      -webkit-line-clamp: 1;
    }

    .time-widget-main {
      color: var(--text-primary);
      font-size: calc(42px * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1;
      letter-spacing: -.05em;
      text-shadow: 0 1px 12px color-mix(in srgb, var(--bg-primary) 72%, transparent);
    }

    .focus-title {
      color: var(--text-primary);
      font-size: calc(var(--font-size-title) * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1.35;
    }

    .focus-text {
      margin-top: calc(4px * var(--desktop-widget-scale));
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .widget-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: calc(10px * var(--desktop-widget-scale));
    }

    .widget-mark {
      width: calc(34px * var(--desktop-widget-scale));
      height: calc(34px * var(--desktop-widget-scale));
      flex: 0 0 calc(34px * var(--desktop-widget-scale));
      border-radius: calc(14px * var(--desktop-widget-scale));
      background: var(--accent-light);
      color: var(--accent-dark);
    }

    .custom-widget-content {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(10px * var(--desktop-widget-scale));
      color: var(--text-primary);
      font-size: calc(14px * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1.35;
      text-align: center;
      word-break: break-word;
      text-shadow: 0 1px 12px color-mix(in srgb, var(--bg-primary) 74%, transparent);
    }

    .page-dots {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(100px + env(safe-area-inset-bottom));
      z-index: 4;
      gap: 7px;
      pointer-events: none;
    }

    .page-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--text-hint);
      opacity: .62;
      transition: all 200ms ease;
    }

    .page-dot.active {
      width: 20px;
      background: var(--accent);
      opacity: .92;
    }

    .dock {
      position: fixed;
      left: 22px;
      right: 22px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 8;
      min-height: 76px;
      justify-content: space-around;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 30px;
      background: color-mix(in srgb, var(--bg-card) 76%, transparent);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transform: scale(var(--desktop-dock-scale));
      transform-origin: center bottom;
    }

    .dock .desktop-icon {
      position: relative;
      left: auto !important;
      top: auto !important;
      width: 64px;
      animation: none;
      touch-action: none;
    }

    .dock .desktop-icon-art {
      width: 58px;
      height: 58px;
      padding: 0;
      margin: 0;
      border-radius: 20px;
      background: color-mix(in srgb, var(--bg-card) 92%, transparent);
    }

    .dock .desktop-icon-art.has-custom-image {
      padding: 0;
      margin: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .dock .desktop-icon-name,
    .dock .desktop-delete-dot {
      display: none !important;
    }

    .hidden-hint {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 16px;
      padding: 12px 14px;
      border-radius: 20px;
      background: color-mix(in srgb, var(--bg-card) 84%, transparent);
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
      font-size: var(--font-size-small);
      line-height: 1.5;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    #app-layer {
      position: fixed;
      top: var(--app-viewport-top, 0px);
      right: 0;
      bottom: auto;
      left: 0;
      height: var(--app-viewport-height, 100dvh);
      z-index: 30;
      pointer-events: none;
      transform: translateZ(0);
    }

    #app-layer.has-app {
      pointer-events: auto;
    }

    .placeholder-app {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .app-topbar {
      min-height: calc(58px + env(safe-area-inset-top));
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding: env(safe-area-inset-top) 20px 12px;
      background: color-mix(in srgb, var(--bg-primary) 88%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .app-back {
      width: 38px;
      height: 38px;
      border-radius: 16px;
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      transition: all 200ms ease;
    }

    .app-title {
      flex: 1;
      color: var(--text-primary);
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
      text-align: center;
    }

    .app-topbar-spacer {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
    }

    .placeholder-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 24px calc(42px + env(safe-area-inset-bottom));
    }

    .placeholder-card {
      width: min(100%, 420px);
      padding: 26px;
      border-radius: 28px;
      background: var(--bg-card);
      box-shadow: var(--shadow-md);
    }

    .placeholder-icon {
      width: 58px;
      height: 58px;
      overflow: hidden;
      margin-bottom: 18px;
      padding: 0;
      border-radius: 22px;
      background: var(--accent-light);
      color: var(--accent-dark);
    }

    .placeholder-title {
      margin: 0;
      color: var(--text-primary);
      font-size: 22px;
      font-weight: 600;
      line-height: 1.3;
    }

    .placeholder-text {
      margin: 10px 0 0;
      color: var(--text-secondary);
      font-size: var(--font-size-base);
      line-height: 1.7;
    }

    .placeholder-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .placeholder-actions .btn-ghost,
    .placeholder-actions .btn-primary {
      min-height: 38px;
      padding: 0 16px;
      border-radius: var(--radius-full);
      font: inherit;
      font-weight: 600;
    }

    .lock-screen {
      position: fixed;
      inset: 0;
      z-index: 900;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      padding: calc(68px + env(safe-area-inset-top)) 24px calc(36px + env(safe-area-inset-bottom));
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: all 200ms ease;
    }

    .lock-screen.hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transform: scale(1.02);
    }

    .lock-soft-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: var(--bg-primary);
      opacity: .22;
    }

    .lock-top,
    .lock-pad {
      position: relative;
      z-index: 1;
    }

    .lock-top {
      text-align: center;
    }

    .lock-avatar {
      width: 84px;
      height: 84px;
      margin: 0 auto 20px;
      overflow: hidden;
      padding: 0;
      border-radius: 28px;
      box-shadow: var(--shadow-md);
      background: var(--bg-card);
    }

    .lock-title {
      margin: 0;
      color: var(--text-primary);
      font-size: 24px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -.02em;
      text-shadow: 0 1px 12px color-mix(in srgb, var(--bg-primary) 72%, transparent);
    }

    .lock-subtitle {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: var(--font-size-base);
      line-height: 1.6;
    }

    .lock-dots {
      gap: 12px;
      margin-top: 26px;
    }

    .lock-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--text-hint) 48%, transparent);
      transition: all 200ms ease;
    }

    .lock-dot.filled {
      background: var(--accent);
      transform: scale(1.08);
    }

    .lock-error {
      min-height: 22px;
      margin-top: 18px;
      color: var(--accent-dark);
      font-size: var(--font-size-small);
      line-height: 1.5;
      text-align: center;
    }

    .lock-pad {
      width: min(100%, 320px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .lock-key {
      height: 64px;
      border-radius: 24px;
      background: color-mix(in srgb, var(--bg-card) 86%, transparent);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      font-size: 22px;
      font-weight: 500;
      transition: all 200ms ease;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .lock-key.secondary {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .desktop-loading {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      color: var(--text-secondary);
      transition: all 200ms ease;
    }

    .desktop-loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loading-card {
      min-width: 166px;
      padding: 22px;
      border-radius: 28px;
      background: var(--bg-card);
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .loading-mark {
      width: 38px;
      height: 38px;
      margin: 0 auto 12px;
      border-radius: 15px;
      background: var(--accent-light);
      animation: soft-pulse 1400ms ease-in-out infinite;
    }

    .loading-text {
      color: var(--text-secondary);
      font-size: var(--font-size-small);
    }

    .loading-detail {
      margin-top: 8px;
      color: var(--text-hint);
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }

    .loading-retry {
      margin-top: 14px;
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      background: var(--accent);
      color: var(--bubble-user-text);
      font: inherit;
      font-weight: 700;
    }

    @keyframes icon-wiggle {
      0% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
      100% { transform: rotate(-1deg); }
    }

    @keyframes soft-pulse {
      0% { transform: scale(.92); opacity: .55; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(.92); opacity: .55; }
    }

    /* ═══════════════════════════════════════
       【黑胶唱片小组件】桌面音乐播放器
    ═══════════════════════════════════════ */

    .vinyl-widget {
      width: min(calc(306px * var(--desktop-widget-scale)), calc(100vw - 40px));
      height: calc(114px * var(--desktop-widget-scale));
      display: flex;
      align-items: center;
      gap: calc(12px * var(--desktop-widget-scale));
      padding: calc(12px * var(--desktop-widget-scale));
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--border-soft) 58%, transparent);
      background: linear-gradient(135deg, color-mix(in srgb, var(--bg-card) 76%, transparent), color-mix(in srgb, var(--accent) 15%, transparent));
      box-shadow: 0 calc(12px * var(--desktop-widget-scale)) calc(30px * var(--desktop-widget-scale)) color-mix(in srgb, var(--text-primary) 12%, transparent);
    }

    .vinyl-record-wrap {
      position: relative;
      flex-shrink: 0;
      width: calc(80px * var(--desktop-widget-scale));
      height: calc(80px * var(--desktop-widget-scale));
      border-radius: calc(24px * var(--desktop-widget-scale));
      background: color-mix(in srgb, var(--accent) 12%, var(--bg-card));
      padding: calc(6px * var(--desktop-widget-scale));
    }

    .vinyl-record {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: repeating-radial-gradient(circle, color-mix(in srgb, var(--text-primary) 62%, var(--bg-card)) 0 2px, color-mix(in srgb, var(--text-primary) 52%, var(--bg-card)) 3px 5px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: vinyl-spin 4s linear infinite;
      animation-play-state: paused;
      box-shadow: 0 calc(5px * var(--desktop-widget-scale)) calc(14px * var(--desktop-widget-scale)) color-mix(in srgb, var(--text-primary) 18%, transparent);
    }

    .vinyl-record.spinning {
      animation-play-state: running;
    }

    .vinyl-groove {
      position: absolute;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--text-primary) 15%, transparent);
      pointer-events: none;
    }

    .vinyl-groove-1 {
      width: 88%;
      height: 88%;
      top: 6%;
      left: 6%;
    }

    .vinyl-groove-2 {
      width: 72%;
      height: 72%;
      top: 14%;
      left: 14%;
    }

    .vinyl-groove-3 {
      width: 56%;
      height: 56%;
      top: 22%;
      left: 22%;
    }

    .vinyl-cover {
      width: calc(32px * var(--desktop-widget-scale));
      height: calc(32px * var(--desktop-widget-scale));
      border-radius: 50%;
      overflow: hidden;
      z-index: 2;
      background: color-mix(in srgb, var(--accent) 30%, var(--bg-card));
      box-shadow: 0 0 0 calc(4px * var(--desktop-widget-scale)) color-mix(in srgb, var(--bg-card) 74%, transparent);
    }

    .vinyl-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .vinyl-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      background: radial-gradient(circle at 70% 22%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 26%), linear-gradient(145deg, color-mix(in srgb, var(--accent) 16%, var(--bg-card)), var(--bg-card));
    }

    .vinyl-cover-placeholder svg {
      width: calc(14px * var(--desktop-widget-scale));
      height: calc(14px * var(--desktop-widget-scale));
    }

    .vinyl-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: calc(4px * var(--desktop-widget-scale));
    }

    .vinyl-title {
      font-size: calc(14px * var(--desktop-widget-scale));
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 12px color-mix(in srgb, var(--bg-primary) 72%, transparent);
    }

    .vinyl-artist {
      font-size: calc(12px * var(--desktop-widget-scale));
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vinyl-controls {
      display: flex;
      align-items: center;
      gap: calc(6px * var(--desktop-widget-scale));
      margin-top: calc(2px * var(--desktop-widget-scale));
    }

    .vinyl-ctrl-btn {
      width: calc(32px * var(--desktop-widget-scale));
      height: calc(32px * var(--desktop-widget-scale));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, var(--bg-primary) 40%, transparent);
      color: var(--text-primary);
      border: 1px solid color-mix(in srgb, var(--border-soft) 55%, transparent);
      transition: all 200ms ease;
    }

    .vinyl-ctrl-btn:active {
      transform: scale(0.9);
    }

    .vinyl-ctrl-btn.main-play {
      width: calc(38px * var(--desktop-widget-scale));
      height: calc(38px * var(--desktop-widget-scale));
      background: var(--accent);
      color: var(--bubble-user-text);
    }

    .vinyl-ctrl-btn svg {
      width: calc(16px * var(--desktop-widget-scale));
      height: calc(16px * var(--desktop-widget-scale));
    }

    .vinyl-ctrl-btn.main-play svg {
      width: calc(18px * var(--desktop-widget-scale));
      height: calc(18px * var(--desktop-widget-scale));
    }

    .vinyl-empty-text {
      font-size: calc(12px * var(--desktop-widget-scale));
      color: var(--text-hint);
    }

    .vinyl-record.preparing { animation: vinyl-pulse 1.1s ease-in-out infinite; }

    @keyframes vinyl-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes vinyl-pulse { 50% { transform: scale(.96); opacity: .72; } }
    @media (prefers-reduced-motion: reduce) { .vinyl-record { animation: none; } }
    /* 奶油手账桌面：与应用内的全局视觉语言保持一致。 */
    .status-cute-pill {
      border: 1px solid color-mix(in srgb, var(--border-soft) 68%, transparent);
      background: color-mix(in srgb, var(--bg-card) 94%, transparent);
      color: var(--icon-color);
      box-shadow: var(--shadow-sm);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .desktop-soft-layer {
      background:
        radial-gradient(circle at 16% 20%, color-mix(in srgb, var(--accent-light) 58%, transparent), transparent 28%),
        radial-gradient(circle at 88% 72%, color-mix(in srgb, var(--decor-blue) 36%, transparent), transparent 26%),
        var(--bg-primary);
      opacity: .9;
    }

    .desktop-grid {
      column-gap: 22px;
      row-gap: 24px;
    }

    .desktop-icon-art {
      width: calc(var(--desktop-icon-art-size) * var(--desktop-icon-scale));
      height: calc(var(--desktop-icon-art-size) * var(--desktop-icon-scale));
      border: 1px solid color-mix(in srgb, var(--border-soft) 72%, transparent);
      border-radius: 34% 42% 36% 44%;
      background: var(--icon-tile-bg);
      color: var(--icon-color);
      box-shadow: none;
    }

    .desktop-icon-art:not(.has-custom-image):has(.cozy-app-icon) {
      background: var(--icon-tile-bg);
      box-shadow: none;
    }

    .desktop-icon:nth-child(3n + 2) .desktop-icon-art {
      background: var(--icon-tile-alt-cool);
    }

    .desktop-icon:nth-child(3n) .desktop-icon-art {
      background: var(--icon-tile-alt-warm);
    }

    .desktop-icon-name {
      color: var(--text-primary);
      font-weight: 650;
      text-shadow: none;
    }

    .dock {
      border: 1px solid color-mix(in srgb, var(--border-soft) 72%, transparent);
      border-radius: var(--radius-xl);
      background: color-mix(in srgb, var(--bg-card) 94%, transparent);
      box-shadow: var(--shadow-card);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .dock::before,
    .dock::after {
      content: '';
      position: absolute;
      top: -7px;
      width: 18px;
      height: 18px;
      border-radius: 50% 50% 44% 48%;
      background: var(--accent-light);
      border: 1px solid color-mix(in srgb, var(--border-soft) 68%, transparent);
      transform: rotate(45deg);
    }

    .dock::before { left: 20px; }
    .dock::after { right: 20px; }

    .dock .desktop-icon-art {
      border-radius: 38% 44% 40% 46%;
      box-shadow: none;
    }

    .app-topbar {
      background: color-mix(in srgb, var(--bg-primary) 94%, var(--bg-card));
      border-bottom: 1px solid color-mix(in srgb, var(--border-soft) 58%, transparent);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .app-back,
    .lock-key {
      border: 0;
      border-radius: var(--radius-full);
      background: var(--accent-light);
      color: var(--icon-color);
      box-shadow: none;
    }

    .placeholder-card,
    .lock-panel {
      border: 1px solid color-mix(in srgb, var(--border-soft) 70%, transparent);
      border-radius: var(--radius-xl);
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
    }
  

    /* 黄系小挂件桌面统一层 */
    .desktop-journal-layer {
      background:
        radial-gradient(circle at 9% 12%, color-mix(in srgb, var(--accent-light) 40%, transparent) 0 2px, transparent 3px),
        radial-gradient(circle at 88% 16%, color-mix(in srgb, var(--decor-blue) 30%, transparent) 0 2px, transparent 3px),
        linear-gradient(90deg, transparent 0 30px, color-mix(in srgb, var(--border-soft) 28%, transparent) 31px 32px, transparent 33px),
        linear-gradient(180deg, color-mix(in srgb, var(--bg-card) 42%, transparent), transparent 24%);
      opacity: .86;
    }

    .status-cute-pill,
    .desktop-widget,
    .dock {
      border: 1px solid color-mix(in srgb, var(--border-soft) 66%, transparent);
      background: linear-gradient(145deg, color-mix(in srgb, var(--bg-card) 88%, transparent), color-mix(in srgb, var(--accent-light) 18%, transparent));
      box-shadow: var(--shadow-card), inset 0 1px 0 color-mix(in srgb, white 76%, transparent);
    }

    .desktop-icon-art {
      border: 1px solid color-mix(in srgb, var(--border-soft) 72%, transparent);
      background: linear-gradient(145deg, var(--surface-paper), color-mix(in srgb, var(--accent-light) 34%, var(--bg-card)));
      box-shadow: var(--shadow-md), inset 0 1px 0 color-mix(in srgb, white 82%, transparent);
    }

    .desktop-icon-art:not(.has-custom-image):has(.cozy-app-icon) {
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .cozy-app-icon {
      --icon-line: color-mix(in srgb, var(--text-primary) 52%, var(--accent-dark));
      --icon-fur: color-mix(in srgb, var(--surface-paper) 90%, var(--accent-light));
      --icon-accent: color-mix(in srgb, var(--accent) 72%, var(--bg-card));
      --icon-soft: color-mix(in srgb, var(--accent-light) 78%, var(--bg-card));
      --icon-blush: color-mix(in srgb, var(--decor-pink) 66%, var(--accent-light));
      filter: drop-shadow(0 8px 12px color-mix(in srgb, var(--accent-dark) 12%, transparent));
    }

    .desktop-icon-name {
      color: var(--text-primary);
      text-shadow: 0 1px 10px color-mix(in srgb, var(--bg-card) 86%, transparent);
      font-weight: 600;
    }

    .page-dot {
      background: color-mix(in srgb, var(--accent-dark) 32%, var(--bg-card));
      box-shadow: inset 0 1px 0 color-mix(in srgb, white 72%, transparent);
    }

    .page-dot.active {
      background: var(--accent-strong);
    }
</style>
</head>

<body>
  <main id="desktop" class="phone-desktop" data-image-key="app_wallpaper">
    <div class="desktop-soft-layer"></div>
    <div class="desktop-journal-layer" aria-hidden="true"></div>

    <div class="status-bar" aria-label="小手机状态">
      <div class="status-cute-pill">
        <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.2-8.8-8.4C1.8 8.3 3.7 5 7 5c1.9 0 3.2 1 4 2.2C11.8 6 13.1 5 15 5c3.3 0 5.2 3.3 3.8 6.6C17 15.8 12 20 12 20Z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M7.5 8.2C6.8 6.3 7.8 4.8 9.4 5.1c.8.1 1.5.7 2.1 1.5.6-.8 1.3-1.4 2.1-1.5 1.6-.3 2.6 1.2 1.9 3.1"/><path d="M5.8 11.4c0-3 2.8-5.1 6.2-5.1s6.2 2.1 6.2 5.1v2.5c0 3.2-2.6 5.6-6.2 5.6s-6.2-2.4-6.2-5.6v-2.5Z"/><path d="M9.4 13h.1M14.5 13h.1M10.4 16c.9.6 2.3.6 3.2 0"/></svg>
        <svg viewBox="0 0 24 24"><path d="M6.5 15.5c1.5-1 2.3-2.6 2.4-4.5.1-2.2 1.5-4.1 3.8-4.1 2.5 0 4.2 2.2 4.2 5.2 0 3.9-2.8 6.4-6.6 6.4-1.9 0-3.4-.6-4.5-1.6-.6-.6-.2-1.1.7-1.4Z"/><path d="M9 8.2c-1.1-.8-2.5-.8-3.4.1M16.8 9c1.1-.8 2.5-.8 3.4.1M12 13h.1M15.1 12.3h.1"/></svg>
        <svg viewBox="0 0 24 24"><path d="M8 8v8M16 8v8M11 6.5v11M13 6.5v11"/><path d="M4.5 11.5v1M19.5 11.5v1"/></svg>
        <svg viewBox="0 0 24 24"><path d="M7 14c0-3.5 2.1-6 5-6s5 2.5 5 6"/><path d="M6.2 15.4c.8 2.1 2.9 3.4 5.8 3.4s5-1.3 5.8-3.4"/><path d="M8.5 8.5 7 6.5M15.5 8.5 17 6.5M9.2 13.2h.1M14.7 13.2h.1M10.3 16c.9.5 2.5.5 3.4 0"/></svg>
        <svg viewBox="0 0 24 24"><path d="M6 18h12"/><path d="M7 15c.9-1.4 1.6-2.7 2.1-4.7.4-1.5 1.4-2.8 2.9-2.8s2.5 1.3 2.9 2.8c.5 2 1.2 3.3 2.1 4.7"/><path d="M9.2 15.2c1.6.9 4 .9 5.6 0"/></svg>
        <svg viewBox="0 0 24 24"><path d="M5 16v2M9.5 13v5M14 10v8M18.5 7v11"/><path d="M4 20h16"/></svg>
        <svg class="status-paw" viewBox="0 0 24 24"><path d="M8.2 10.2c.7 0 1.2-.8 1.2-1.8S8.9 6.6 8.2 6.6 7 7.4 7 8.4s.5 1.8 1.2 1.8ZM15.8 10.2c.7 0 1.2-.8 1.2-1.8s-.5-1.8-1.2-1.8-1.2.8-1.2 1.8.5 1.8 1.2 1.8ZM11 9.2c.7 0 1.2-.8 1.2-1.8S11.7 5.6 11 5.6s-1.2.8-1.2 1.8.5 1.8 1.2 1.8ZM13 9.2c.7 0 1.2-.8 1.2-1.8S13.7 5.6 13 5.6s-1.2.8-1.2 1.8.5 1.8 1.2 1.8Z"/><path d="M7.5 15.3c0-2.4 2.1-4.2 4.5-4.2s4.5 1.8 4.5 4.2c0 1.9-1.5 3.1-4.5 3.1s-4.5-1.2-4.5-3.1Z"/></svg>
        <span id="status-time" class="status-time">--:--</span>
        <span id="status-online" class="status-online">在线</span>
      </div>
    </div>

    <section id="desktop-pages" class="desktop-pages" aria-label="桌面页面">
      <div class="desktop-page" data-page="0">
        <div class="desktop-widget-area" data-widget-area="0" data-image-key="app_widget_area_bg"></div>
        <div class="desktop-free-layer" data-layer="0"></div>
      </div>
      <div class="desktop-page" data-page="1">
        <div class="desktop-widget-area" data-widget-area="1" data-image-key="app_widget_area_bg"></div>
        <div class="desktop-free-layer" data-layer="1"></div>
      </div>
    </section>

    <div class="page-dots" aria-hidden="true">
      <span class="page-dot active" data-dot="0"></span>
      <span class="page-dot" data-dot="1"></span>
    </div>

    <nav id="dock" class="dock" aria-label="固定栏"></nav>
  </main>

  <section id="app-layer" aria-live="polite"></section>

  <section id="lock-screen" class="lock-screen hidden" aria-label="密码锁屏" data-image-key="app_lock_background">
    <div class="lock-soft-layer"></div>

    <div class="lock-top">
      <div class="lock-avatar" data-image-key="app_lock_avatar">

      const state = window.__AI_PHONE_BOOT_STATE;
      const show = (message, detail) => {
        if (state.ready) return;
        state.failed = true;
        const loading = document.getElementById('desktop-loading');
        if (!loading) return;
        loading.classList.remove('hide');
        loading.innerHTML = '';
        const card = document.createElement('div');
        card.className = 'loading-card';
        const mark = document.createElement('div');
        mark.className = 'loading-mark';
        const text = document.createElement('div');
        text.className = 'loading-text';
        text.textContent = message || '小手机刚刚没醒好，可以刷新再试一次';
        const note = document.createElement('div');
        note.className = 'loading-detail';
        note.textContent = detail || `停在：${state.stage || 'module:loading'}`;
        const retry = document.createElement('button');
        retry.type = 'button';
        retry.className = 'loading-retry';
        retry.textContent = '刷新试试';
        retry.addEventListener('click', () => window.location.reload());
        card.append(mark, text, note, retry);
        loading.append(card);
      };
      window.addEventListener('error', (event) => {
        if (state.ready) return;
        const message = event?.message || event?.error?.message || '模块加载没接上';
        show('小手机刚刚没醒好', `停在：${state.stage || 'module:loading'}；${message}`);
      });
      window.addEventListener('unhandledrejection', (event) => {
        if (state.ready) return;
        const reason = event?.reason;
        const message = reason?.message || String(reason || '启动承诺没有完成');
        show('小手机刚刚没醒好', `停在：${state.stage || 'module:loading'}；${message}`);
      });
      window.setTimeout(() => {
        if (!state.ready) show('小手机醒得有点慢', `停在：${state.stage || 'module:loading'}，可以刷新试试`);
      }, 12000);

    async function readImageRecord(key) {

    function isExplicitUserCustomIconRecord(record) {
      const image = getImageFromRecord(record);
      if (!image) return false;
      const meta = `${record?.source || ''} ${record?.sourceType || ''} ${record?.imageSource || ''} ${record?.type || ''} ${record?.url || ''} ${record?.imageUrl || ''}`.toLowerCase();
      if (/user|local|upload|url/.test(meta)) return true;
      if (/^(https?:|blob:)/.test(image)) return true;
      return !image.startsWith('data:image/svg');
    }

    function isLegacyDefaultAppIconRecord(record) {
      const image = getImageFromRecord(record);
      if (!image || !image.startsWith('data:image/svg')) return false;
      if (isExplicitUserCustomIconRecord(record)) return false;
      let decoded = image;
      const comma = image.indexOf(',');
      if (comma >= 0) {
        const payload = image.slice(comma + 1);
        try { decoded = image.slice(0, comma).includes(';base64') ? atob(payload) : decodeURIComponent(payload); }
        catch (_) { decoded = payload; }
      }
      return /cozy-app-icon|icon-badge-frame|cream-bell|badge-soft-half|badge-stitch|class=["'](?:bell|bow)["']/.test(decoded);
    }

    async function removeAppIconImage(appId) {
      const app = APPS.find((item) => item.id === appId);
      if (!app) return false;
      const keys = getAppIconImageKeys(app);
      const objectUrls = new Set();
      const imageFields = new Set(IMAGE_VALUE_FIELDS.concat(['imageBase64', 'blobKey', 'backgroundCleared']));
      for (const key of keys) {
        collectObjectUrls(await getDB('blobs', key), objectUrls);
        await deleteDB('blobs', key);
        const localRecord = getData(key);
        collectObjectUrls(localRecord, objectUrls);
        if (getImageFromRecord(localRecord)) {
          if (localRecord && typeof localRecord === 'object') {
            const preserved = Object.fromEntries(Object.entries(localRecord).filter(([field]) => !imageFields.has(field)));
            if (Object.keys(preserved).length) setData(key, preserved);
            else removeData(key);
          } else removeData(key);
        }
        removeData(`${key}_meta`);

      const icons = getCustomIcons();
      for (const [key, current] of Object.entries(icons)) {
        if (!current || typeof current !== 'object') continue;
        const itemName = String(current.name || '').trim();
        const itemAppId = String(current.appId || current.id || '').trim();
        if (!keys.includes(key) && itemAppId !== app.id && !keys.includes(itemName)) continue;

    function collectObjectUrls(record, urls) {

      const opacity = normalizeImageOpacity(value.opacity ?? value.alpha ?? value.transparency ?? value.imageOpacity ?? 100);
      return { ...value, key: value.key || key, value: value.value || image, source: value.source || image, data: value.data || '', opacity, name: value.name || '', type: value.type || '', updatedAt: value.updatedAt || getNow() };

    function getImageFromRecord(record) {
      if (!record) return '';
      if (typeof record === 'string') return isUsableImage(record) ? record.trim() : '';
      if (typeof record !== 'object') return '';
      for (const field of IMAGE_VALUE_FIELDS) {

    async function safelyApplyAppIconImage(iconEl) {
      const appId = iconEl?.dataset?.appId || '';
      const app = APPS.find((item) => item.id === appId);
      const artEl = iconEl?.querySelector?.('.desktop-icon-art');
      if (!app || !artEl) return;
      try {
        const custom = await readIconRecord(app);
        const customImage = getImageFromRecord(custom);
        const customName = custom?.name || app.name;
        const nextNodes = [];
        if (customImage) {
          const image = document.createElement('img');
          image.className = 'desktop-icon-image'; image.alt = ''; image.src = customImage; image.draggable = false;
          image.style.opacity = String(getOpacityFromRecord(custom));

            artEl.replaceChildren(createDefaultAppIcon(app, 28));

          nextNodes.push(image);
        } else {
          nextNodes.push(createDefaultAppIcon(app, 28));
        }
        iconEl.setAttribute('aria-label', customName);
        const nameEl = iconEl.querySelector('.desktop-icon-name');
        if (nameEl) nameEl.textContent = customName;
        artEl.classList.toggle('has-custom-image', Boolean(customImage));

    async function applyCurrentAppImage() { if (!currentAppId) return; const appRoot = appLayerEl.querySelector('[data-image-key]'); if (!appRoot) return; await applyImageToElement(appRoot, `app_bg_${currentAppId}`, { opacity: false }); }

    async function readIconRecord(app) {
      const icons = getCustomIcons();
      const primaryKey = getPrimaryAppIconImageKey(app);
      const weakKeys = getWeakAppIconImageKeys(app);
      const primaryRecord = await readStoredImageRecordExact(primaryKey);
      let imageRecord = null;

      if (isLegacyDefaultAppIconRecord(primaryRecord)) {
        await clearIconImageKey(primaryKey);
      } else if (isExplicitUserCustomIconRecord(primaryRecord)) {
        imageRecord = primaryRecord;
      }

      if (!imageRecord) {
        for (const key of weakKeys) {
          const record = await readStoredImageRecordExact(key);
          if (!record) continue;
          if (isLegacyDefaultAppIconRecord(record)) {
            await clearIconImageKey(key);
            continue;
          }
          if (isExplicitUserCustomIconRecord(record)) {
            imageRecord = await migrateWeakIconRecord(app, key, record);
            break;
          }
        }
      }

      const localRecord = findLocalIconRecord(app, icons, [primaryKey, ...weakKeys]);
      const localHasLegacyImage = isLegacyDefaultAppIconRecord(localRecord);
      const localHasUserImage = isExplicitUserCustomIconRecord(localRecord);
      let nameRecord = localRecord;

      if (localHasLegacyImage) {
        nameRecord = await stripLegacyLocalIconImage(app, localRecord, icons);
      } else if (localHasUserImage) {
        imageRecord = await promoteLocalIconRecord(app, localRecord, icons) || imageRecord;
      }

      const image = getImageFromRecord(imageRecord);
      if (image) {
        const opacitySource = imageRecord?.opacity ?? nameRecord?.opacity ?? 100;
        return normalizeImageRecord({ ...(imageRecord || {}), name: nameRecord?.name || imageRecord?.name || app.name, opacity: opacitySource }, primaryKey);
      }
      if (nameRecord?.name || nameRecord?.backgroundCleared === true) {
        return { name: nameRecord.name || app.name, opacity: normalizeImageOpacity(nameRecord.opacity ?? 100), backgroundCleared: nameRecord.backgroundCleared === true };
      }
      return null;
    }

    function findLocalIconRecord(app, icons, keys) {
      const direct = icons[app.id] || icons[getPrimaryAppIconImageKey(app)] || icons[app.name] || null;
      if (direct) return direct;
      for (const key of keys) if (icons[key]) return icons[key];
      return Object.values(icons).find((item) => {
        if (!item || typeof item !== 'object') return false;
        const itemName = String(item.name || '').trim();
        const itemAppId = String(item.appId || item.id || '').trim();
        return itemAppId === app.id || itemName === app.name || itemName === app.id || keys.includes(itemName);
      }) || null;
    }

    async function stripLegacyLocalIconImage(app, record, icons) {
      const sourceKey = Object.keys(icons).find((key) => icons[key] === record);
      const { image, iconImage, backgroundImage, imageBase64, imageUrl, url, src, data, value, source, file, base64, blobKey, ...preserved } = record || {};
      if (sourceKey) {
        if (Object.keys(preserved).length) icons[sourceKey] = preserved;
        else delete icons[sourceKey];
        setData('app_icons', icons);
      }
      const primaryKey = getPrimaryAppIconImageKey(app);
      if (blobKey && blobKey !== primaryKey) await clearIconImageKey(blobKey);
      return Object.keys(preserved).length ? preserved : null;
    }

    async function promoteLocalIconRecord(app, record, icons) {
      const image = getImageFromRecord(record);
      if (!image) return null;
      const primaryKey = getPrimaryAppIconImageKey(app);
      const sourceKey = Object.keys(icons).find((key) => icons[key] === record);
      const normalized = normalizeImageRecord({ ...record, key: primaryKey, value: image, image, iconImage: image, backgroundImage: image, imageBase64: image, blobKey: primaryKey, updatedAt: getNow() }, primaryKey);
      if (sourceKey && sourceKey !== app.id) {
        delete icons[sourceKey];
        icons[app.id] = { ...record, blobKey: primaryKey, updatedAt: getNow() };
        setData('app_icons', icons);
      }
      await setDB('blobs', primaryKey, normalized);
      return normalized;
    }

    function getCustomIcons() { const icons = getData('app_icons'); return icons && typeof icons === 'object' ? icons : {}; }

    function getCustomWidgets() { const widgets = getData('app_custom_widgets'); return Array.isArray(widgets) ? widgets.map(normalizeCustomWidget).filter((item) => item.id) : []; }

    function normalizeCustomWidget(widget) {
      const raw = widget && typeof widget === 'object' ? widget : {};
      return { id: String(raw.id || '').trim(), name: String(raw.name || '').trim(), shape: ['circle','square','rectangle','wide'].includes(raw.shape) ? raw.shape : 'square', image: getImageFromRecord(raw), text: typeof raw.text === 'string' ? raw.text : '', opacity: normalizeImageOpacity(raw.opacity ?? 100), createdAt: raw.createdAt || '', updatedAt: raw.updatedAt || '' };

    function getHiddenIcons() { const hidden = getData('app_hidden_icons'); return Array.isArray(hidden) ? hidden : []; }
    function saveHiddenIcons(hiddenIcons) { setData('app_hidden_icons', [...new Set(hiddenIcons)]); }
    function getIconPositions() { const positions = getData('app_icon_positions'); return positions && typeof positions === 'object' ? positions : {}; }
    function saveIconPositions(positions) { setData('app_icon_positions', positions); }
    function getWidgetPositions() { const positions = getData('app_widget_positions'); return positions && typeof positions === 'object' ? positions : {}; }
    function saveWidgetPositions(positions) { setData('app_widget_positions', positions); }

    function getDockOrder() { const saved = getData(DOCK_ORDER_KEY); const dockIds = APPS.filter((app) => app.dock).map((app) => app.id); const ordered = Array.isArray(saved) ? saved.filter((id) => dockIds.includes(id)) : []; const missing = dockIds.filter((id) => !ordered.includes(id)); return [...new Set([...ordered, ...missing])]; }
    function saveDockOrder(order) { const dockIds = APPS.filter((app) => app.dock).map((app) => app.id); setData(DOCK_ORDER_KEY, [...new Set(order.filter((id) => dockIds.includes(id)))]); }

    function getDesktopScale() { const saved = getData('desktop_layout_scale') || {}; return { iconScale: normalizeScale(saved.iconScale, 1), widgetScale: normalizeScale(saved.widgetScale, 1), dockScale: normalizeScale(saved.dockScale, 1) }; }
    function normalizeScale(value, fallback = 1) { const number = Number(value); if (!Number.isFinite(number)) return fallback; return Math.max(.62, Math.min(1.28, number)); }
    function applyDesktopScale() { const scale = getDesktopScale(); document.documentElement.style.setProperty('--desktop-icon-scale', String(scale.iconScale)); document.documentElement.style.setProperty('--desktop-widget-scale', String(scale.widgetScale)); document.documentElement.style.setProperty('--desktop-dock-scale', String(scale.dockScale)); }

    async function applyCustomFontFromStorage() {
      try { const record = await getDB('blobs', CUSTOM_FONT_KEY); const dataUrl = record?.value || record?.source || record?.data || '';
        if (!dataUrl) { document.getElementById(CUSTOM_FONT_STYLE_ID)?.remove(); document.documentElement.style.removeProperty('--font-main'); return false; }
        injectCustomFont(dataUrl, record?.type || '', record?.name || ''); document.documentElement.style.setProperty('--font-main', CUSTOM_FONT_FAMILY); return true;
      } catch (_) { document.getElementById(CUSTOM_FONT_STYLE_ID)?.remove(); return false; }

    function injectCustomFont(dataUrl, type = '', name = '') {
      document.getElementById(CUSTOM_FONT_STYLE_ID)?.remove();
      const style = document.createElement('style');
      style.id = CUSTOM_FONT_STYLE_ID;

      document.head.appendChild(style);

    function getFontFormat(type, name = '') {
      const nt = String(type || '').toLowerCase(); const nn = String(name || '').toLowerCase();
      if (nt.includes('woff2') || nn.endsWith('.woff2')) return 'woff2';

    function ensureDefaultSettings() {
      const saved = getData('app_settings') || {};
      const next = { ...DEFAULT_SETTINGS, ...saved, ttsGlobal: { ...DEFAULT_SETTINGS.ttsGlobal, ...(saved.ttsGlobal || {}) }, user: { ...DEFAULT_SETTINGS.user, ...(saved.user || {}) }, widgets: { ...DEFAULT_SETTINGS.widgets, ...(saved.widgets || {}) }, mcpServers: Array.isArray(saved.mcpServers) ? saved.mcpServers : [], apiEndpoints: Array.isArray(saved.apiEndpoints) ? saved.apiEndpoints : [], dreamEnabled: saved.dreamEnabled === true };

    function ensureFirstOpenSeed() { if (getData('app_first_open_seed')) return; setData('app_first_open_seed', { id: generateId(), createdAt: getNow() }); }

    async function renderDesktop() {
      document.querySelectorAll('.desktop-free-layer').forEach((layer) => { layer.innerHTML = ''; });
      dockEl.innerHTML = '';

      const hiddenIcons = getHiddenIcons();

      for (const appId of getDockOrder()) {
        const app = APPS.find((item) => item.id === appId && item.dock);
        if (!app) continue;
        try { dockEl.appendChild(createDesktopIcon(app)); }
        catch (error) { logDesktopFailure('dock-app', error, { appId }); }
      }

      await renderWidgets();

      APPS.filter((app) => !app.dock && !hiddenIcons.includes(app.id)).forEach((app, index) => {
        try {
          const iconEl = createDesktopIcon(app);
          const position = getResolvedIconPosition(app, index);
          const layer = getLayer(position.page);
          if (!layer) throw new Error(`desktop layer ${position.page} missing`);
          layer.appendChild(iconEl);
          placeDesktopItem(iconEl, position.x, position.y);
        } catch (error) {
          logDesktopFailure('desktop-app', error, { appId: app.id });
        }
      });

      if (hiddenIcons.length) {
        const hint = document.createElement('div');
        hint.className = 'hidden-hint';
        hint.textContent = '有些图标藏起来了，去设置里找找';
        const hintLayer = getLayer(1);
        if (hintLayer) hintLayer.appendChild(hint);
      }

      safeDesktopTask('editing:update', updateEditingClass);
      safeDesktopTask('page-dots:update', updatePageDots);
      safeDesktopTask('clock:update', updateClock);
      safeDesktopTask('weather:update', () => updateWeather().catch((error) => logDesktopFailure('weather', error)));
      safeDesktopTask('anniversary:update', updateAnniversaryWidget);
      safeDesktopTask('vinyl:update', updateVinylWidget);

      window.clearTimeout(renderTimer);
      renderTimer = window.setTimeout(() => applyAllImages().catch((error) => logDesktopFailure('images:timer', error)), 60);
    }

    function safeDesktopTask(stage, task) {
      try { return task(); }
      catch (error) { logDesktopFailure(stage, error); return null; }
    }

    function logDesktopFailure(stage, error, meta = {}) {
      const message = error?.message || String(error || 'unknown error');
      console.warn('[desktop] recoverable failure', { stage, ...meta, message }, error);
    }

    async function renderWidgets() {
      let settings = DEFAULT_SETTINGS;
      try { settings = ensureDefaultSettings(); }
      catch (error) { logDesktopFailure('widgets:settings', error); }
      const enabled = settings.widgets || DEFAULT_SETTINGS.widgets;

      WIDGETS.forEach((widget) => {
        try {
          if (widget.id === 'time' && enabled.time === false) return;
          if (widget.id === 'weather' && enabled.weather === false) return;
          if (widget.id === 'anniversary' && enabled.anniversary === false) return;
          if (widget.id === 'vinyl' && enabled.vinyl === false) return;
          const widgetEl = createWidget(widget);
          const position = getResolvedWidgetPosition(widget);
          const layer = getLayer(position.page);
          if (!layer) throw new Error(`desktop layer ${position.page} missing`);
          layer.appendChild(widgetEl);
          placeDesktopItem(widgetEl, position.x, position.y);
        } catch (error) {
          logDesktopFailure('widget', error, { widgetId: widget.id });
        }
      });

      await renderCustomWidgets();
    }

    async function renderCustomWidgets() {
      let widgets = [];
      try { widgets = getCustomWidgets(); }
      catch (error) { logDesktopFailure('custom-widgets:list', error); return; }
      for (let index = 0; index < widgets.length; index++) {
        const widget = widgets[index];
        try {
          const widgetEl = await createCustomWidget(widget);
          const position = getResolvedCustomWidgetPosition(widget, index);
          const layer = getLayer(position.page);
          if (!layer) throw new Error(`desktop layer ${position.page} missing`);
          layer.appendChild(widgetEl);
          placeDesktopItem(widgetEl, position.x, position.y);
        } catch (error) {
          logDesktopFailure('custom-widget', error, { widgetId: widget?.id || index });
        }
      }
    }

    function createWidget(widget) {
      const widgetEl = document.createElement('section');
      widgetEl.className = `desktop-item desktop-widget ${widget.shape}`;
      widgetEl.dataset.kind = 'widget';
      widgetEl.dataset.widgetId = widget.id;
      widgetEl.dataset.imageKey = `app_widget_bg_${widget.id}`;
      widgetEl.setAttribute('aria-label', widget.label);

      if (widget.id === 'time') {
        widgetEl.id = 'time-widget';
        widgetEl.innerHTML = `<div><div id="clock-large" class="time-widget-main">--:--</div><div id="date-line" class="time-widget-sub">正在准备桌面</div></div><div class="widget-label">当前时间</div>`;
      }
      if (widget.id === 'weather') {
        widgetEl.id = 'weather-widget';
        widgetEl.innerHTML = `<div class="widget-top"><div class="widget-label">天气</div><div class="widget-mark" data-weather-icon></div></div><div id="weather-value" class="weather-content" aria-live="polite"><div class="widget-value">正在读取天气</div><div class="weather-meta">请稍候</div></div>`;
        widgetEl.addEventListener('click', (event) => {
          if (editing || dragState || clickSuppressor.consume() || event.target.closest('button')) return;
          if (widgetEl.dataset.weatherAction === 'settings') openWeatherSettings();
          else if (widgetEl.dataset.weatherAction === 'retry') updateWeather({ force: true });
          else updateWeather({ force: true });
        });
      }

        prevBtn.appendChild(createIcon('back', 16));
        prevBtn.type = 'button';
        prevBtn.setAttribute('aria-label', '上一首');
        prevBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const player = getAPI('music');

        playBtn.className = 'vinyl-ctrl-btn main-play';
