    async function createCustomWidget(widget) {
      const widgetEl = document.createElement('section');
      widgetEl.className = `desktop-item desktop-widget desktop-custom-widget ${widget.shape}`;
      widgetEl.dataset.kind = 'widget';
      widgetEl.dataset.widgetId = `custom_${widget.id}`;
      widgetEl.dataset.customWidgetId = widget.id;
      widgetEl.dataset.imageKey = `custom_widget_${widget.id}`;
      widgetEl.setAttribute('aria-label', widget.name || '自定义小组件');

      let image = widget.image || '';
      if (!image) {
        try {
          const dbRecord = await getDB('blobs', `custom_widget_${widget.id}`);
          if (dbRecord) image = dbRecord.value || dbRecord.image || dbRecord.data || '';
        } catch {}
      }

      if (image) {
        widgetEl.classList.add('has-image');
        widgetEl.style.backgroundImage = `url("${cssUrl(image)}")`;
      }

      widgetEl.style.opacity = String(normalizeImageOpacity(widget.opacity) / 100);

      const content = document.createElement('div');
      content.className = 'custom-widget-content';
      if (widget.text) { content.textContent = widget.text; }
      else if (!image) { content.appendChild(createIcon('star', 28)); }

      widgetEl.appendChild(content);
      widgetEl.addEventListener('pointerdown', (event) => handleDesktopItemPointerDown(event, widgetEl));
      return widgetEl;
    }

    function createDesktopIcon(app) {
      const iconEl = document.createElement('button');
      const artEl = document.createElement('span');
      const nameEl = document.createElement('span');
      const deleteEl = document.createElement('span');
      const badgeEl = document.createElement('span');

      iconEl.type = 'button';
      iconEl.className = app.dock ? 'desktop-icon' : 'desktop-item desktop-icon';
      iconEl.dataset.kind = app.dock ? 'dock' : 'icon';
      iconEl.dataset.appId = app.id;
      iconEl.dataset.imageKey = `app_icon_${app.id}`;
      iconEl.setAttribute('aria-label', app.name);

      artEl.className = 'desktop-icon-art';
      artEl.appendChild(createDefaultAppIcon(app, 28));

      nameEl.className = 'desktop-icon-name';
      nameEl.textContent = app.name;

      deleteEl.className = 'desktop-delete-dot';
      deleteEl.setAttribute('aria-hidden', 'true');
      deleteEl.appendChild(createIcon('close', 12));

      badgeEl.className = 'badge hidden';
      badgeEl.dataset.badge = app.id;

      iconEl.append(artEl, nameEl, deleteEl, badgeEl);

      deleteEl.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (!editing || app.dock) return;
        const hiddenIcons = getHiddenIcons();
        hiddenIcons.push(app.id);
        saveHiddenIcons(hiddenIcons);
        renderDesktop();
        showToast('已隐藏，可在设置中恢复');
      });

      iconEl.addEventListener('click', (event) => {
        if (dragState || dockDragState) { event.preventDefault(); event.stopPropagation(); return; }
        openApp(app.id);
      });

      if (app.dock) { iconEl.addEventListener('pointerdown', (event) => handleDockIconPointerDown(event, iconEl)); }
      else { iconEl.addEventListener('pointerdown', (event) => handleDesktopItemPointerDown(event, iconEl)); }

      return iconEl;
    }

    function getLayer(page) { return document.querySelector(`.desktop-free-layer[data-layer="${Number(page) === 1 ? 1 : 0}"]`); }

    function getResolvedIconPosition(app, index) {
      const saved = getIconPositions()[app.id];
      if (saved && Number.isFinite(Number(saved.x)) && Number.isFinite(Number(saved.y))) return { page: Number(saved.page) === 1 ? 1 : 0, x: Number(saved.x), y: Number(saved.y) };
      return { page: Number(app.page) === 1 ? 1 : 0, x: 20 + (index % 4) * 86, y: 430 + Math.floor(index / 4) * 96 };
    }

    function getResolvedWidgetPosition(widget) {
      const saved = getWidgetPositions()[widget.id];
      if (saved && Number.isFinite(Number(saved.x)) && Number.isFinite(Number(saved.y))) return { page: Number(saved.page) === 1 ? 1 : 0, x: Number(saved.x), y: Number(saved.y) };
      return { page: Number(widget.defaultPage) === 1 ? 1 : 0, x: Number(widget.defaultX) || 20, y: Number(widget.defaultY) || 20 };
    }

    function getResolvedCustomWidgetPosition(widget, index) {
      const saved = getWidgetPositions()[`custom_${widget.id}`];
      if (saved && Number.isFinite(Number(saved.x)) && Number.isFinite(Number(saved.y))) return { page: Number(saved.page) === 1 ? 1 : 0, x: Number(saved.x), y: Number(saved.y) };
      return { page: 1, x: 20 + (index % 2) * 148, y: 24 + Math.floor(index / 2) * 148 };
    }

    function placeDesktopItem(element, x, y) { const safe = clampPosition(element, x, y); element.style.left = `${safe.x}px`; element.style.top = `${safe.y}px`; }

    function clampPosition(element, x, y) {
      const page = element.closest('.desktop-page');
      const rect = page ? page.getBoundingClientRect() : pagesEl.getBoundingClientRect();
      const w = element.offsetWidth || 72;
      const h = element.offsetHeight || 72;
      return { x: Math.max(0, Math.min(Math.max(0, rect.width - w), Number(x) || 0)), y: Math.max(0, Math.min(Math.max(0, rect.height - h), Number(y) || 0)) };
    }

    function handleDesktopItemPointerDown(event, element) {
      if (event.button !== undefined && event.button !== 0) return;
      if (element.dataset.kind === 'dock') return;
      if (event.target.closest('.desktop-delete-dot')) return;

      const startX = event.clientX;
      const startY = event.clientY;
      const itemW = element.offsetWidth || 72;
      const itemH = element.offsetHeight || 72;
      // 记录起始样式 / 父节点，用于中断时回滚（不写脏数据）
      const startLeft = element.style.left || '';
      const startTop = element.style.top || '';
      const startPos = element.style.position || '';
      const startParent = element.parentElement;
      let moved = false;
      let holdTimer = null;
      let holdFired = false;
      let finished = false;
      const pointerId = event.pointerId;

      try { element.setPointerCapture?.(pointerId); } catch (_) {}

      // 统一收尾：commit=true 落位并保存；commit=false 中断回滚不写数据
      // 幂等（finished 守卫），pointerup / pointercancel / 页面失焦都可安全调用
      const finish = (commit) => {
        if (finished) return;
        finished = true;
        if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
        edgeScheduler.clear();
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        window.removeEventListener('pointercancel', onCancel);
        try { element.releasePointerCapture?.(pointerId); } catch (_) {}

        if (!moved) { return; }

        if (commit) {
          // 落位到当前可见页（currentPage 已被边缘翻页同步更新）
          const targetPage = currentPage;
          const targetLayer = getLayer(targetPage);
          element.style.position = '';
          if (element.parentElement !== targetLayer) { targetLayer.appendChild(element); }
          // fixed 视口坐标 → 目标页 layer 局部坐标
          const layerRect = targetLayer.getBoundingClientRect();
          const lastCenterX = parseFloat(element.style.left || '0') + itemW / 2;
          const lastCenterY = parseFloat(element.style.top || '0') + itemH / 2;
          const localX = lastCenterX - layerRect.left - itemW / 2;
          const localY = lastCenterY - layerRect.top - itemH / 2;
          const position = clampPosition(element, Math.max(0, localX), Math.max(0, localY));
          placeDesktopItem(element, position.x, position.y);
          saveDesktopItemPosition(element, targetPage, position.x, position.y);
        } else {
          // 中断回滚：恢复起始位置与父节点，不保存数据
          element.style.position = startPos;
          element.style.left = startLeft;
          element.style.top = startTop;
          if (startParent && element.parentElement !== startParent) { startParent.appendChild(element); }
        }

        // 落位收尾：先 .dragging → .settling，保持 transition:none + scale(1.035)，
        // 隔离 pointerup 后残留一帧的 :active 伪类，避免 :active 的 scale(.96) 叠加
        // 恢复的 transition:all 触发 1.035→0.96→1.0 双段缩闪。待下一帧 + 短延迟
        // （:active 已释放）后再移除 .settling，transform 单次平滑回弹。
        element.classList.remove('dragging');
        element.classList.add('settling');
        pagesEl.classList.remove('dragging');
        silentEdit = true;
        updateEditingClass();
        // 拖拽发生过则抑制随后的合成 click，防止误开下方 / 原位置 APP
        clickSuppressor.suppress();
        dragState = null;
        // 双 rAF 确保跨过当前帧与下一帧渲染（:active 在此期间释放），再延迟 60ms 兜底
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            element.classList.remove('settling');
          });
        });
        // 兜底：极端情况下 rAF 仍早于 :active 释放时，60ms 后强制清理
        window.setTimeout(() => { element.classList.remove('settling'); }, 120);
      };

      const onMove = (moveEvent) => {
        const deltaX = moveEvent.clientX - startX;
        const deltaY = moveEvent.clientY - startY;

        // 长按未触发前：横向轻滑取消长按（让正常翻页手势可在空白处接管）
        if (!holdFired) {
          if (Math.abs(deltaX) > 12 && Math.abs(deltaY) < Math.abs(deltaX)) { finish(false); return; }
          return;
        }

        moveEvent.preventDefault();
        if (!moved) {
          moved = true;
          editing = true;
          dragState = { element, kind: element.dataset.kind, id: element.dataset.kind === 'icon' ? element.dataset.appId : element.dataset.widgetId };
          element.classList.add('dragging');
          pagesEl.classList.add('dragging');
          updateEditingClass();
          // fixed 定位脱离页面容器，避免 scrollLeft 偏移和 overflow 裁切，跟手更顺
          element.style.position = 'fixed';
        }

        // 始终用视口坐标定位，跟随手指/鼠标
        const vx = moveEvent.clientX - itemW / 2;
        const vy = moveEvent.clientY - itemH / 2;
        element.style.left = `${Math.max(0, Math.min(window.innerWidth - itemW, vx))}px`;
        element.style.top = `${Math.max(0, Math.min(window.innerHeight - itemH, vy))}px`;
        // 边缘翻页：进入热区并停留才翻，离开立即取消；首末页不越界
        edgeScheduler.schedule(moveEvent.clientX, window.innerWidth, (dir) => {
          flipDesktopPage(dir);
        });
      };

      const onUp = () => finish(true);
      const onCancel = () => finish(false);

      // 350ms 长按后才允许进入拖拽，避免横向轻滑误触发编辑态
      holdTimer = window.setTimeout(() => { holdFired = true; }, 350);

      window.addEventListener('pointermove', onMove, { passive: false });
      window.addEventListener('pointerup', onUp, { passive: true });
      window.addEventListener('pointercancel', onCancel, { passive: true });
    }

    function handleDockIconPointerDown(event, element) {
      if (event.button !== undefined && event.button !== 0) return;
      const startX = event.clientX;
      const startY = event.clientY;
      const appId = element.dataset.appId;
      let moved = false;
      let holdTimer = null;
      let holdFired = false;
      let finished = false;
      const pointerId = event.pointerId;
      try { element.setPointerCapture?.(pointerId); } catch (_) {}

      const finish = (commit) => {
        if (finished) return;
        finished = true;
        if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        window.removeEventListener('pointercancel', onCancel);
        try { element.releasePointerCapture?.(pointerId); } catch (_) {}

        if (!moved) { return; }
        element.classList.remove('dock-dragging');
        element.style.transform = '';
        if (commit) {
          saveDockOrder([...dockEl.querySelectorAll('.desktop-icon[data-app-id]')].map((item) => item.dataset.appId));
        }
        // 保留编辑态但停止抖动，与桌面拖拽一致
        silentEdit = true;
        updateEditingClass();
        // 拖拽发生过则抑制随后的合成 click，防止误开 APP
        clickSuppressor.suppress();
        dockDragState = null;
      };

      const onMove = (moveEvent) => {
        const deltaX = moveEvent.clientX - startX;
        const deltaY = moveEvent.clientY - startY;

        // 长按未触发前：移动取消长按
        if (!holdFired) {
          if (Math.hypot(deltaX, deltaY) > 12) { finish(false); return; }
          return;
        }

        moveEvent.preventDefault();
        if (!moved) { moved = true; editing = true; dockDragState = { appId }; element.classList.add('dock-dragging'); updateEditingClass(); }
        element.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(1.035)`;
        const target = document.elementFromPoint(moveEvent.clientX, moveEvent.clientY)?.closest('.dock .desktop-icon[data-app-id]');
        if (!target || target === element) return;
        const box = target.getBoundingClientRect();
        const before = moveEvent.clientX < box.left + box.width / 2;
        dockEl.insertBefore(element, before ? target : target.nextSibling);
      };

      const onUp = () => finish(true);
      const onCancel = () => finish(false);

      // 350ms 长按后才允许进入拖拽
      holdTimer = window.setTimeout(() => { holdFired = true; }, 350);

      window.addEventListener('pointermove', onMove, { passive: false });
      window.addEventListener('pointerup', onUp, { passive: true });
      window.addEventListener('pointercancel', onCancel, { passive: true });
    }

    function saveDesktopItemPosition(element, page, x, y) {
      if (element.dataset.kind === 'icon') { const positions = getIconPositions(); positions[element.dataset.appId] = { page, x, y, updatedAt: getNow() }; saveIconPositions(positions); return; }
      if (element.dataset.kind === 'widget') { const positions = getWidgetPositions(); positions[element.dataset.widgetId] = { page, x, y, updatedAt: getNow() }; saveWidgetPositions(positions); }
    }

    function updateEditingClass() {
      document.querySelectorAll('.desktop-icon').forEach((iconEl) => { iconEl.classList.toggle('editing', editing && iconEl.dataset.kind !== 'dock'); });
      document.querySelectorAll('.dock .desktop-icon').forEach((iconEl) => { iconEl.classList.toggle('editing', editing); });
      document.querySelectorAll('.desktop-widget').forEach((widgetEl) => { widgetEl.classList.toggle('editing', editing); });
      desktopEl.classList.toggle('silent-edit', silentEdit);
    }

    function bindDesktopEvents() {
      pagesEl.addEventListener('scroll', () => { currentPage = Math.round(pagesEl.scrollLeft / (pagesEl.clientWidth || 1)); updatePageDots(); }, { passive: true });
      desktopEl.addEventListener('click', (event) => { if (!editing) return; if (event.target.closest('.desktop-icon, .desktop-widget, .dock')) return; editing = false; silentEdit = false; updateEditingClass(); });
      window.addEventListener('resize', handleWindowResize);
      window.addEventListener('storage', async () => { await applyAllImages(); refreshBadges(); });
      window.addEventListener('desktop:refresh', async () => { loadTheme(); applyDesktopScale(); await applyCustomFontFromStorage(); await refreshDesktop(); });
      window.addEventListener('app-settings-updated', async () => { loadTheme(); applyDesktopScale(); await applyCustomFontFromStorage(); await refreshDesktop(); });
      window.addEventListener('app-images-updated', applyAllImages);
      window.addEventListener('online', updateStatusOnline);
      window.addEventListener('offline', updateStatusOnline);

      // 捕获阶段拦截拖拽结束后的合成 click，防止误开下方/原位置 APP
      // 比定时器更可靠：不依赖 click 与 pointerup 的时序，只吃掉拖拽后的第一个 click
      document.addEventListener('click', (event) => {
        if (!clickSuppressor.consume()) return;
        event.preventDefault();
        event.stopPropagation();
      }, true);
      // 浏览器对大位移拖拽通常不再合成 click，此时 suppress 会残留；
      // 在下一次手势开始时清除，保证下次真实点击不被误吃
      document.addEventListener('pointerdown', () => { clickSuppressor.reset(); }, true);

      // 页面隐藏 / 失焦 / 后台时强制结束进行中的拖拽，防状态残留卡死桌面
      const abortDragOnInterrupt = () => {
        if (dragState || dockDragState) {
          edgeScheduler.clear();
          // 触发一次合成 pointercancel 让各 handler 的 onCancel 收尾（回滚不保存）
          const targets = [];
          if (dragState?.element) targets.push(dragState.element);
          if (dockDragState?.appId) { const el = dockEl.querySelector(`.desktop-icon[data-app-id="${dockDragState.appId}"]`); if (el) targets.push(el); }
          for (const el of targets) { try { el.dispatchEvent(new PointerEvent('pointercancel', { bubbles: true, cancelable: true })); } catch (_) {} }
        }
      };
      window.addEventListener('visibilitychange', abortDragOnInterrupt);
      window.addEventListener('blur', abortDragOnInterrupt);
      window.addEventListener('pagehide', abortDragOnInterrupt);

      // 桌面元素阻止浏览器长按图片预览 / 保存菜单 / 原生拖拽
      // 仅在桌面根节点内生效，不影响 #app-layer 内的图片查看与无障碍
      desktopEl.addEventListener('contextmenu', (event) => {
        if (event.target.closest('.desktop-item, .desktop-widget, .desktop-icon, .desktop-icon-image')) event.preventDefault();
      });
      desktopEl.addEventListener('dragstart', (event) => {
        if (event.target.closest('.desktop-item, .desktop-widget, .desktop-icon, .desktop-icon-image')) event.preventDefault();
      });
      desktopEl.addEventListener('selectstart', (event) => {
        if (event.target.closest('.desktop-item, .desktop-widget, .desktop-icon, .desktop-icon-image')) event.preventDefault();
      });
    }

    function handleWindowResize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const widthChanged = Math.abs(width - lastViewportWidth) > 8;
      const heightChanged = Math.abs(height - lastViewportHeight) > 120;
      const activeInput = document.activeElement?.matches?.('input, textarea, select');
      if (!widthChanged && heightChanged && activeInput) { lastViewportHeight = height; return; }
      lastViewportWidth = width;
      lastViewportHeight = height;
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(() => { renderDesktop(); }, RESIZE_RENDER_DELAY);
    }

    function updatePageDots() {
      const dotsEl = document.querySelector('.page-dots');
      if (!dotsEl) return;
      const count = getDesktopPageCount();
      while (dotsEl.children.length < count) {
        const dot = document.createElement('span');
        dot.className = 'page-dot';
        dot.dataset.dot = String(dotsEl.children.length);
        dotsEl.appendChild(dot);
      }
      while (dotsEl.children.length > count) dotsEl.lastElementChild?.remove();
      dotsEl.querySelectorAll('.page-dot').forEach((dot) => {
        dot.classList.toggle('active', Number(dot.dataset.dot) === currentPage);
      });
    }

    function bindLockScreen() {
      lockPadEl.addEventListener('click', (event) => {
        const key = event.target.closest('[data-key]')?.dataset.key;
        if (!key) return;
        window.clearTimeout(lockCheckTimer);
        lockCheckTimer = null;
        if (key === 'clear') { lockInput = ''; lockErrorEl.textContent = ''; renderLockDots(); return; }
        if (key === 'delete') { lockInput = lockInput.slice(0, -1); lockErrorEl.textContent = ''; renderLockDots(); return; }
        if (lockInput.length >= LOCK_PASSWORD.length) return;
        lockInput += key;
        lockErrorEl.textContent = '';
        renderLockDots();
        if (lockInput.length === LOCK_PASSWORD.length) { lockCheckTimer = window.setTimeout(checkLockPassword, 120); }
      });
    }

    function updateLockState() {
      const savedLockState = getData('app_lock_unlocked');
      const unlocked = savedLockState !== false;
      lockScreenEl.classList.toggle('hidden', unlocked);
      lockScreenEl.setAttribute('aria-hidden', String(unlocked));
      lockScreenEl.inert = unlocked;
      desktopEl.inert = !unlocked;
      appLayerEl.inert = !unlocked;
      if (!unlocked) {
        window.clearTimeout(lockCheckTimer);
        lockCheckTimer = null;
        lockInput = '';
        lockErrorEl.textContent = '';
        renderLockDots();
        lockPadEl.querySelector('button')?.focus({ preventScroll: true });
      }
    }
    function renderLockDots() { [...lockDotsEl.querySelectorAll('.lock-dot')].forEach((dot, index) => { dot.classList.toggle('filled', index < lockInput.length); }); }
    function checkLockPassword() { lockCheckTimer = null; if (lockInput === LOCK_PASSWORD) { setData('app_lock_unlocked', true); updateLockState(); showToast('解锁啦'); return; } lockInput = ''; lockErrorEl.textContent = '嘿嘿，不对哦'; renderLockDots(); }

    function initWidgets() {
      updateClock(); clearInterval(clockTimer); clockTimer = window.setInterval(updateClock, 1000);
      updateWeather(); clearInterval(weatherTimer); weatherTimer = window.setInterval(updateWeather, 1000 * 60 * 30);
      updateAnniversaryWidget(); updateVinylWidget();
      if (!vinylOff) vinylOff = busSubscribe({
        'music:statechange': updateVinylWidget,
        'music:change': updateVinylWidget,

      });
      if (!widgetCleanupBound) {

    function destroyWidgets() {
      clearInterval(clockTimer); clearInterval(weatherTimer);
      clockTimer = null; weatherTimer = null;
      weatherController?.abort(); weatherController = null; weatherRequest = null;

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
      const date = now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });
      const clockLarge = document.getElementById('clock-large');

    function updateStatusOnline() {
      if (!statusOnlineEl) return;

    }

    async function updateWeather({ force = false, retry = false } = {}) {
      const weatherValueEl = document.getElementById('weather-value');
      if (!weatherValueEl) return null;
      const cached = getData('app_weather_cache') || getData('weather_cache');
      if (!force && isFreshWeatherCache(cached)) { renderWeather(cached); return cached; }
      if (weatherRequest) return weatherRequest;

      renderWeatherStatus('正在刷新真实天气', '正在确认位置与天气数据', null);
      weatherController?.abort();
      weatherController = new AbortController();
      const controller = weatherController;
      const timeoutId = window.setTimeout(() => controller.abort(), 8000);

      weatherRequest = (async () => {
        try {
          const location = await resolveWeatherLocation(controller.signal);
          const response = await fetch(buildOpenMeteoForecastUrl(location.latitude, location.longitude), { cache: 'no-store', signal: controller.signal });
          if (!response.ok) throw new Error(`weather ${response.status}`);
          const weather = normalizeOpenMeteoWeather(await response.json(), location);
          if (!weather) throw new Error('weather payload invalid');
          const cache = { ...weather, text: formatWeatherPrimary(weather), provider: 'open-meteo' };
          setData('app_weather_cache', cache);
          renderWeather(cache);
          return cache;
        } catch (error) {
          if (!retry && error?.name !== 'AbortError') {
            renderWeatherStatus('天气还在路上', '稍等一下，小手机会再试一次；点这里也能马上重试', () => updateWeather({ force: true }));
            window.setTimeout(() => updateWeather({ force: true, retry: true }).catch(() => {}), 1200);
            return cached || null;
          }
          if (cached) {
            renderWeather(cached, '天气刚刚没刷新好，点卡片再试一次');
            const widget = document.getElementById('weather-widget');
            if (widget) widget.dataset.weatherAction = 'retry';
            return cached;
          }
          renderWeatherStatus('暂时没有天气数据', error?.name === 'AbortError' ? '请求超时，点这里再试一次' : '点这里再试一次，或去设置里补一下城市', () => updateWeather({ force: true }));
          return null;
        } finally {
          window.clearTimeout(timeoutId);
          if (weatherController === controller) { weatherController = null; weatherRequest = null; }
        }
      })();
      return weatherRequest;
    }

    function isFreshWeatherCache(cache) {
      return cache && Number.isFinite(Number(cache.temperature)) && Number(cache.updatedAt) > 0 && Date.now() - Number(cache.updatedAt) < 1000 * 60 * 30;
    }

    function getWeatherConfigRecord() {
      for (const key of ['app_weather_config', 'app_weather_settings', 'weather_config', 'weather_settings']) {
        const value = getData(key);
        if (value && typeof value === 'object') return { key, value };
      }
      return { key: 'app_weather_config', value: {} };
    }

    async function resolveWeatherLocation(signal) {
      const configRecord = getWeatherConfigRecord();
      const config = configRecord.value;
      const latitude = Number(config.latitude ?? config.lat);
      const longitude = Number(config.longitude ?? config.lon ?? config.lng);
      if (Number.isFinite(latitude) && Number.isFinite(longitude)) {
        return { cityName: config.cityName || config.city || config.location || '', latitude, longitude, timezone: config.timezone || '' };
      }
      const cityName = String(config.cityName || config.city || config.location || '').trim();
      if (cityName) {
        const response = await fetch(buildOpenMeteoGeocodingUrl(cityName), { cache: 'no-store', signal });
        if (!response.ok) throw new Error(`geocoding ${response.status}`);
        const match = (await response.json())?.results?.[0];
        if (!match) throw new Error('city not found');
        const resolved = { cityName: match.name || cityName, latitude: Number(match.latitude), longitude: Number(match.longitude), timezone: match.timezone || '' };
        setData(configRecord.key, { ...config, ...resolved, updatedAt: getNow() });
        return resolved;
      }
      return getBrowserWeatherLocation(signal);
    }

    function getBrowserWeatherLocation(signal) {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) { reject(new Error('geolocation unavailable')); return; }
        if (signal.aborted) { reject(new DOMException('Aborted', 'AbortError')); return; }
        const onAbort = () => reject(new DOMException('Aborted', 'AbortError'));
        signal.addEventListener('abort', onAbort, { once: true });
        navigator.geolocation.getCurrentPosition((position) => {
          signal.removeEventListener('abort', onAbort);
          resolve({ cityName: '', latitude: position.coords.latitude, longitude: position.coords.longitude, timezone: '' });
        }, (error) => {
          signal.removeEventListener('abort', onAbort); reject(error);
        }, { enableHighAccuracy: false, timeout: 8000, maximumAge: 1000 * 60 * 30 });
      });
    }

    function formatWeatherPrimary(weather) {
      const temp = Number.isFinite(Number(weather.temperature)) ? `${Math.round(Number(weather.temperature))}℃` : '';
      return [weather.cityName, temp, weatherCodeLabel(weather.weatherCode)].filter(Boolean).join(' · ');
    }

    function renderWeather(weather, notice = '') {
      const weatherValueEl = document.getElementById('weather-value');
      if (!weatherValueEl) return;
      const widget = document.getElementById('weather-widget');
      if (widget) widget.dataset.weatherAction = '';
      if (!Number.isFinite(Number(weather.temperature))) {
        renderWeatherStatus(weather.text || '上次天气数据', notice || '旧缓存信息不完整，点这里去设置里看看', openWeatherSettings);
        return;
      }
      weatherValueEl.innerHTML = '';
      const primary = document.createElement('div'); primary.className = 'widget-value'; primary.textContent = formatWeatherPrimary(weather);
      const details = document.createElement('div'); details.className = 'weather-meta';
      details.textContent = `体感 ${Math.round(Number(weather.apparentTemperature))}℃ · 湿度 ${Math.round(Number(weather.humidity))}% · 风速 ${Math.round(Number(weather.windSpeed))} km/h`;
      weatherValueEl.append(primary, details);
      if (notice) { const note = document.createElement('div'); note.className = 'weather-notice'; note.textContent = notice; weatherValueEl.append(note); }
      renderWeatherIcon(weather.weatherCode, weather.isDay);
    }

    function renderWeatherStatus(title, detail, action = null) {
      const weatherValueEl = document.getElementById('weather-value');
      if (!weatherValueEl) return;
      const widget = document.getElementById('weather-widget');
      if (widget) widget.dataset.weatherAction = action ? (action === openWeatherSettings ? 'settings' : 'retry') : '';
      weatherValueEl.innerHTML = '';
      const primary = document.createElement('div'); primary.className = 'widget-value'; primary.textContent = title;
      const meta = document.createElement(action ? 'button' : 'div');
      meta.className = 'weather-meta'; meta.textContent = detail;
      if (action) { meta.type = 'button'; meta.addEventListener('click', (event) => { event.stopPropagation(); action(); }); }
      weatherValueEl.append(primary, meta); renderWeatherIcon(null, true);
    }

    function renderWeatherIcon(code, isDay) {
      const host = document.querySelector('[data-weather-icon]');
      if (!host) return;
      host.innerHTML = '';
      if (code == null) { host.appendChild(createIcon('refresh', 18)); return; }
      host.appendChild(createWeatherStatusIcon(Number(code), isDay));
    }

    function createWeatherStatusIcon(code, isDay) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('width', '18'); svg.setAttribute('height', '18');
      svg.setAttribute('fill', 'none'); svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '1.7');
      svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round'); svg.setAttribute('aria-hidden', 'true');
      const path = (d) => { const node = document.createElementNS('http://www.w3.org/2000/svg', 'path'); node.setAttribute('d', d); return node; };
      if (code === 0) {
        svg.append(path(isDay ? 'M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19' : 'M18 16.5A7.5 7.5 0 0 1 9 6a7 7 0 1 0 9 10.5z'));
        return svg;
      }
      if ([45, 48].includes(code)) { svg.append(path('M4 9h16M2 13h15M6 17h16')); return svg; }
      svg.append(path('M6.5 16.5h10a4 4 0 0 0 .4-8 5.5 5.5 0 0 0-10.4 1.8 3.1 3.1 0 0 0 0 6.2z'));
      if (code >= 95) svg.append(path('m13 12-2 3h2l-2 3'));
      else if ((code >= 71 && code <= 77) || code >= 85) svg.append(path('M8 19h.1M12 20h.1M16 19h.1'));
      else if (code >= 51) svg.append(path('M8 19l-1 2M13 19l-1 2M18 19l-1 2'));
      return svg;
    }

    function updateAnniversaryWidget() {
      const valueEl = document.getElementById('anniversary-value');
      if (!valueEl) return;
      const anniversaries = getAnniversaries();
      if (!anniversaries.length) { valueEl.textContent = '还没有纪念日呢'; return; }
      const today = startOfDay(new Date());
      const next = anniversaries.map((item) => { const date = parseAnniversaryDate(item.date || item.day || item.targetDate); if (!date) return null; let target = new Date(today.getFullYear(), date.getMonth(), date.getDate()); if (target < today) target = new Date(today.getFullYear() + 1, date.getMonth(), date.getDate()); return { ...item, days: Math.round((target - today) / 86400000) }; }).filter(Boolean).sort((a, b) => a.days - b.days)[0];
      valueEl.textContent = next ? next.days === 0 ? `${next.title || next.name || '纪念日'} 就是今天` : `${next.title || next.name || '纪念日'} 还有 ${next.days} 天` : '还没有纪念日呢';
    }

    function getAnniversaries() { for (const key of ['anniversaries', 'app_anniversaries', 'anniversary_list']) { const value = getData(key); if (Array.isArray(value)) return value; } return []; }
    function parseAnniversaryDate(value) { if (!value) return null; const date = new Date(value); return Number.isNaN(date.getTime()) ? null : date; }
    function startOfDay(date) { return new Date(date.getFullYear(), date.getMonth(), date.getDate()); }


    async function openMusicForSelection() {
      showToast('先去音乐库挑一首吧');
      await openApp('music');
      getAPI('music')?.openPlayer?.();
    }

    async function openWeatherSettings() {
      showToast('去设置里补一下天气小卡片');
      await openApp('settings', { section: 'widgets', focus: 'weather' });
    }

    function updateVinylWidget() {
      const disc = document.getElementById('vinyl-disc');
      const coverEl = document.getElementById('vinyl-cover');
      const titleEl = document.getElementById('vinyl-title');
      const artistEl = document.getElementById('vinyl-artist');
      const playBtnEl = document.getElementById('vinyl-play-btn');

      if (!disc) return;

      const player = getAPI('music') || window.musicPlayer;
      const playerState = player?.getState?.() || null;
      const isPlaying = playerState?.isPlaying === true && playerState?.sourceState === 'playing';
      const song = player?.getCurrentSong?.() || (playerState?.songId ? playerState : null);

      disc.classList.toggle('spinning', isPlaying);
      disc.classList.toggle('preparing', playerState?.sourceState === 'preparing');

      if (coverEl) {
        if (song?.cover) {
          coverEl.innerHTML = '';
          const img = document.createElement('img');
          img.src = song.cover;
          img.alt = '';
          coverEl.appendChild(img);
        } else if (!coverEl.querySelector('.vinyl-cover-placeholder')) {
          coverEl.innerHTML = '';
          const ph = document.createElement('div');
          ph.className = 'vinyl-cover-placeholder';
          ph.appendChild(createIcon('music', 14));
          coverEl.appendChild(ph);
        }
      }

      if (titleEl) titleEl.textContent = song?.title || '还没有音乐';
      if (artistEl) artistEl.textContent = song ? (playerState?.sourceState === 'preparing' ? '正在准备播放' : playerState?.needsPlayGesture ? '点一下继续播放' : playerState?.sourceState === 'error' ? (playerState.error || '播放没有成功') : (song.artist || '未知歌手')) : '打开音乐库导入歌曲';

      if (playBtnEl) {
        const svg = playBtnEl.querySelector('svg');
        if (svg) {
          const newIcon = createIcon(playerState?.sourceState === 'preparing' ? 'refresh' : isPlaying ? 'pause' : 'play', 18);
          svg.replaceWith(newIcon);
        }
      }
    }

    function openApp(appId, options = {}) {
      const operation = appOpenQueue.then(() => openAppNow(appId, options));
      appOpenQueue = operation.catch(() => {});
      return operation;
    }

    async function openAppNow(appId, options = {}) {
      const app = APPS.find((item) => item.id === appId);
      if (!app) {
        console.warn('[desktop] openApp missing registration', { appId });
        openPlaceholderApp({ id: String(appId || 'unknown'), name: '这个小窝' }, '这个入口还没找到，可以先回到桌面，或者刷新后再试一次。', { retryAppId: appId });
        return;
      }
      editing = false;
      silentEdit = false;
      updateEditingClass();
      if (!app.ready || !app.module) { openPlaceholderApp(app, '这个小窝还在整理，可以先回到桌面，稍后再来看看。'); return; }
      let stage = 'import';
      try {
        closeCurrentApp({ silent: true });
        appLayerEl.classList.add('has-app');
        appLayerEl.innerHTML = '';
        const module = await import(app.module);
        currentAppModule = module;
        currentAppId = app.id;
        const context = createAppContext(app, options);
        const mountOptions = { ...context, ...options };
        stage = 'mount';
        if (typeof module.mount === 'function') { await module.mount(appLayerEl, mountOptions); }
        else if (typeof module.render === 'function') { await module.render(appLayerEl, mountOptions); }
        else if (typeof module.open === 'function') { await module.open(appLayerEl, mountOptions); }
        else if (typeof module.default === 'function') { await module.default(appLayerEl, mountOptions); }
        else { throw new Error('app entry missing'); }
        await applyAllImages();
      } catch (error) {
        console.error('[desktop] openApp failed', { appId: app.id, stage, error });
        const message = getAppOpenFailureMessage(stage, error);
        openPlaceholderApp(app, message, { retryAppId: app.id });
      }
    }


    function getAppOpenFailureMessage(stage, error) {
      const message = String(error?.message || '');
      if (stage === 'import') {
        if (/Failed to fetch|Load failed|network|fetch/i.test(message)) return '这个小窝刚刚没载入，可能是网络或缓存卡住了。可以刷新试试，或者先回到桌面。';
        return '这个小窝刚刚没打开，可以刷新试试，或先回到桌面稍后再来。';
      }
      if (stage === 'mount') return '这个小窝刚刚没摆稳，可以回到桌面后再点一次，或刷新试试。';
      return '这个小窝刚刚没醒好，可以先回到桌面，稍后再试一次。';
    }

    function createAppContext(app, options = {}) {
      return {
        app, appId: app.id, appLayer: appLayerEl,
        closeApp: closeCurrentApp, closeCurrentApp,
        showToast, createIcon,
        getData, setData, removeData, getDB, setDB, deleteDB, getAllDB, generateId, getNow,
        images: window.AppImages,
        refreshDesktop, refreshBadges, refreshDesktopImages: applyAllImages,
        emit: window.AppEvents.emit, on: window.AppEvents.on,
        appBus: window.AppBus,
        openApp: window.AppBus.openApp,
        options
      };
    }

    function openPlaceholderApp(app, message = '马上就好，先别急', options = {}) {
      closeCurrentApp({ silent: true });
      appLayerEl.classList.add('has-app');
      currentAppId = app.id;
      currentAppModule = null;

      const root = document.createElement('section');
      root.className = 'placeholder-app';
      root.dataset.imageKey = `app_bg_${app.id}`;

      const topbar = document.createElement('div');
      topbar.className = 'app-topbar';
      const backButton = document.createElement('button');
      backButton.className = 'app-back'; backButton.type = 'button'; backButton.setAttribute('aria-label', '返回桌面'); backButton.appendChild(createIcon('back', 20));
      backButton.addEventListener('click', () => closeCurrentApp());
      const title = document.createElement('div');
      title.className = 'app-title'; title.textContent = app.name;
      const spacer = document.createElement('div');
      spacer.className = 'app-topbar-spacer';

      const body = document.createElement('div');
      body.className = 'placeholder-body';
      const card = document.createElement('div');
      card.className = 'placeholder-card';
      const icon = document.createElement('div');
      icon.className = 'placeholder-icon'; icon.appendChild(createDefaultAppIcon(app, 28));
      const heading = document.createElement('h2');
      heading.className = 'placeholder-title'; heading.textContent = app.name;
      const text = document.createElement('p');
      text.className = 'placeholder-text'; text.textContent = message;

      topbar.append(backButton, title, spacer);
      card.append(icon, heading, text);
      const actions = document.createElement('div');
      actions.className = 'placeholder-actions';
      const homeBtn = document.createElement('button');
      homeBtn.type = 'button';
      homeBtn.className = 'btn-ghost';
      homeBtn.textContent = '回到桌面';
      homeBtn.addEventListener('click', () => closeCurrentApp());
      actions.appendChild(homeBtn);
      if (options.retryAppId) {
        const retryBtn = document.createElement('button');
        retryBtn.type = 'button';
        retryBtn.className = 'btn-primary';
        retryBtn.textContent = '再试一次';
        retryBtn.addEventListener('click', () => openApp(options.retryAppId));
        actions.appendChild(retryBtn);
      }
      card.appendChild(actions);
      body.appendChild(card);
      root.append(topbar, body);

      appLayerEl.innerHTML = '';
      appLayerEl.appendChild(root);
      applyPlaceholderImages(app, root, icon);
    }

    async function applyPlaceholderImages(app, root, icon) {
      await applyImageToElement(root, `app_bg_${app.id}`, { opacity: false });
      const record = await readIconRecord(app);
      const image = getImageFromRecord(record);
      if (image) {
        icon.innerHTML = '';
        const img = document.createElement('img');
        img.alt = ''; img.src = image;
        img.style.opacity = String(getOpacityFromRecord(record));
        img.addEventListener('error', () => { icon.innerHTML = ''; icon.appendChild(createDefaultAppIcon(app, 28)); });
        icon.appendChild(img);
      }
    }

    function closeCurrentApp(options = {}) {
      if (currentAppModule && typeof currentAppModule.unmount === 'function') { try { currentAppModule.unmount(); } catch (error) { console.error(error); } }
      currentAppModule = null;
      currentAppId = '';
      appLayerEl.innerHTML = '';
      appLayerEl.classList.remove('has-app');
      if (!options.silent) { refreshBadges(); applyAllImages(); }
    }

    function setupAppEvents() {
      window.addEventListener('app-close', () => closeCurrentApp());
      window.addEventListener('app-lock', () => { setData('app_lock_unlocked', false); updateLockState(); });
      busOn(UNREAD_CHANGED_EVENT, () => refreshBadges());
      busOn('games:unread-updated', (detail) => {
        busEmit(UNREAD_CHANGED_EVENT, { appId: 'games', source: detail?.source || 'games', type: detail?.action || 'changed', count: detail?.count ?? null });
      });
    }

    function refreshBadges() {
      const unreadMap = getUnreadMap();
      document.querySelectorAll('[data-badge]').forEach((badgeEl) => {
        const count = Number(unreadMap[badgeEl.dataset.badge] || 0);
        const wasHidden = badgeEl.classList.contains('hidden');
        if (count > 0) {
          badgeEl.textContent = count > 99 ? '99+' : String(count);
          badgeEl.classList.remove('hidden');
          if (wasHidden) {
            badgeEl.classList.add('badge-pop');
            badgeEl.addEventListener('animationend', function onEnd() {
              badgeEl.classList.remove('badge-pop');
            }, { once: true });
          }
        } else {
          badgeEl.textContent = '';
          badgeEl.classList.add('hidden');
          badgeEl.classList.remove('badge-pop');
        }
      });
    }

    function getUnreadMap() {
      const data = {};
      getRegisteredUnreadSources().forEach((source) => {
        source.keys.forEach((key) => { data[key] = getData(key); });
      });
      return buildUnreadMapFromData(data);
    }
